class SoundSystem {
  constructor() { this._ctx = null; }
  _getCtx() {
    if (!this._ctx) this._ctx = new (window.AudioContext || window.webkitAudioContext)();
    return this._ctx;
  }
  _tone(freq, dur, type = 'sine', vol = 0.3, delay = 0) {
    try {
      const ctx = this._getCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = type;
      osc.frequency.setValueAtTime(freq, ctx.currentTime + delay);
      gain.gain.setValueAtTime(vol, ctx.currentTime + delay);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + dur);
      osc.start(ctx.currentTime + delay);
      osc.stop(ctx.currentTime + delay + dur + 0.05);
    } catch(_) {}
  }
  coin()    { this._tone(880, 0.08); this._tone(1320, 0.12, 'sine', 0.25, 0.08); }
  correct() { [523, 659, 784].forEach((f, i) => this._tone(f, 0.15, 'sine', 0.3, i * 0.1)); }
  wrong()   { this._tone(220, 0.15, 'sawtooth', 0.2); this._tone(180, 0.2, 'sawtooth', 0.15, 0.1); }
  pickup()  { [440, 554, 659, 880].forEach((f, i) => this._tone(f, 0.1, 'sine', 0.2, i * 0.07)); }
  click()   { this._tone(600, 0.04, 'square', 0.1); }
  door()    { this._tone(120, 0.3, 'sawtooth', 0.15); this._tone(100, 0.2, 'sawtooth', 0.1, 0.1); }
}
const sound = new SoundSystem();

// SECTION 3: INPUT (unified pointer events)
// ═══════════════════════════════════════════════════════════════════

class Input {
  constructor(canvas) {
    this.canvas = canvas;
    this.x = 0; this.y = 0;
    this._tapped = false;
    this._tapX = 0; this._tapY = 0;
    this._consumed = false;

    const scale = (e) => {
      const rect = canvas.getBoundingClientRect();
      const sx = W / rect.width;
      const sy = H / rect.height;
      const cx = (e.clientX !== undefined ? e.clientX : e.touches[0].clientX);
      const cy = (e.clientX !== undefined ? e.clientY : e.touches[0].clientY);
      return {
        x: Math.floor((cx - rect.left) * sx),
        y: Math.floor((cy - rect.top) * sy)
      };
    };

    canvas.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      const p = scale(e);
      this.x = p.x; this.y = p.y;
      this._tapped = true;
      this._tapX = p.x; this._tapY = p.y;
      this._consumed = false;
    }, { passive: false });

    canvas.addEventListener('pointermove', (e) => {
      e.preventDefault();
      const p = scale(e);
      this.x = p.x; this.y = p.y;
    }, { passive: false });
  }

  consumeTap() {
    if (this._tapped && !this._consumed) {
      this._consumed = true;
      this._tapped = false;
      return { x: this._tapX, y: this._tapY };
    }
    return null;
  }

  peekTap() {
    return this._tapped && !this._consumed
      ? { x: this._tapX, y: this._tapY }
      : null;
  }
}

function roundRect(ctx, x, y, w, h, r, fill, stroke) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  if (fill) { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 1.5; ctx.stroke(); }
}

function drawPaddy(ctx, x, y, dir = 1, animFrame = 0, celebrate = false) {
  ctx.save();
  ctx.translate(x, y);
  if (dir < 0) ctx.scale(-1, 1);

  // Ground shadow (radial gradient)
  const sg = ctx.createRadialGradient(0, 0, 1, 0, 0, 9);
  sg.addColorStop(0, 'rgba(0,0,0,0.30)');
  sg.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = sg;
  ctx.beginPath(); ctx.ellipse(0, 0, 9, 3, 0, 0, Math.PI * 2); ctx.fill();

  const legOff = celebrate ? Math.sin(animFrame * 0.5) * 4 : (animFrame % 2 === 0 ? 2 : -2);
  const armAng  = celebrate ? -1.1 : (animFrame % 2 === 0 ? 0.15 : -0.15);

  // Legs (rounded rectangles)
  roundRect(ctx, -5, -13 + legOff, 4, 13, 2, PALETTE.darkGreen, null);
  roundRect(ctx, 1,  -13 - legOff, 4, 13, 2, PALETTE.darkGreen, null);

  // Shoes with shine
  roundRect(ctx, -6.5, legOff - 3,  6, 3, 1.5, '#4a2208', null);
  roundRect(ctx,  0.5, -legOff - 3, 6, 3, 1.5, '#4a2208', null);
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.beginPath(); ctx.arc(-4,  legOff - 1.5, 1, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc( 3, -legOff - 1.5, 1, 0, Math.PI * 2); ctx.fill();

  // Body (emerald rounded rect)
  roundRect(ctx, -6, -22, 12, 12, 3, PALETTE.emerald, '#006633');
  // Lapels
  ctx.fillStyle = '#eef0e8';
  ctx.beginPath(); ctx.moveTo(-1,-22); ctx.lineTo(-5,-16); ctx.lineTo(-1,-16); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo( 1,-22); ctx.lineTo( 5,-16); ctx.lineTo( 1,-16); ctx.closePath(); ctx.fill();
  // Gold buckle on jacket
  roundRect(ctx, -2, -17, 4, 3, 0.5, PALETTE.gold, '#886600');

  // Arms (rotated rounded rects)
  if (celebrate) {
    ctx.save(); ctx.translate(-9, -23); ctx.rotate(-armAng);
    roundRect(ctx, -2, 0, 4, 9, 2, PALETTE.emerald, null); ctx.restore();
    ctx.save(); ctx.translate( 9, -23); ctx.rotate( armAng);
    roundRect(ctx, -2, 0, 4, 9, 2, PALETTE.emerald, null); ctx.restore();
  } else {
    ctx.save(); ctx.translate(-9, -21); ctx.rotate(-armAng);
    roundRect(ctx, -2, 0, 4, 9, 2, PALETTE.emerald, null); ctx.restore();
    ctx.save(); ctx.translate( 9, -21); ctx.rotate( armAng);
    roundRect(ctx, -2, 0, 4, 9, 2, PALETTE.emerald, null); ctx.restore();
  }

  // Head (circle, skin tone with highlight)
  ctx.fillStyle = '#f5c892';
  ctx.beginPath(); ctx.arc(0, -27, 6, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#d4a870'; ctx.lineWidth = 0.5; ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.beginPath(); ctx.arc(-2, -30, 2, 0, Math.PI * 2); ctx.fill();

  // Eyes (sclera + iris)
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-2, -28, 1.3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc( 2, -28, 1.3, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.arc(-2, -28, 0.7, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc( 2, -28, 0.7, 0, Math.PI * 2); ctx.fill();
  // Blush
  ctx.fillStyle = 'rgba(255,80,80,0.22)';
  ctx.beginPath(); ctx.arc(-3.5, -26, 1.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc( 3.5, -26, 1.5, 0, Math.PI * 2); ctx.fill();
  // Smile arc
  ctx.strokeStyle = '#333'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(0, -26.5, 2.5, 0.2, Math.PI - 0.2); ctx.stroke();

  // Beard (golden ellipse arc)
  ctx.fillStyle = '#cc9900';
  ctx.beginPath(); ctx.ellipse(0, -22.5, 4, 2.5, 0, 0, Math.PI); ctx.fill();

  // Hat
  ctx.save();
  if (celebrate) ctx.rotate(0.15);
  // Crown (gradient dark green → lighter)
  const hg = ctx.createLinearGradient(-5, -44, 5, -32);
  hg.addColorStop(0, '#002a14'); hg.addColorStop(1, '#005a2a');
  roundRect(ctx, -5, -44, 10, 11, 2, null, null);
  ctx.fillStyle = hg; ctx.fill();
  ctx.strokeStyle = '#001a0a'; ctx.lineWidth = 0.5; ctx.stroke();
  // Brim (trapezoid)
  ctx.fillStyle = '#003a18';
  ctx.beginPath(); ctx.moveTo(-8,-33); ctx.lineTo(8,-33); ctx.lineTo(6,-31); ctx.lineTo(-6,-31); ctx.closePath(); ctx.fill();
  // Hat band (gold stripe)
  ctx.fillStyle = PALETTE.gold;
  ctx.fillRect(-5, -36, 10, 2.5);
  // Buckle on hat
  roundRect(ctx, -2, -37.5, 4, 4, 1, PALETTE.gold, '#886600');
  ctx.restore();

  ctx.restore();
}

function drawNPC(ctx, x, y, type, animFrame = 0, facing = 1) {
  ctx.save();
  ctx.translate(x, y);
  if (facing !== 1) { ctx.scale(-1, 1); }

  // Helper: draw eye pair (white sclera + dark iris)
  function npcEyes(ex, ey) {
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(ex - 2, ey, 1.3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(ex + 2, ey, 1.3, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#222';
    ctx.beginPath(); ctx.arc(ex - 2, ey, 0.7, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(ex + 2, ey, 0.7, 0, Math.PI * 2); ctx.fill();
  }

  if (type === 'siobhan') {
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath(); ctx.ellipse(0, 0, 8, 2.5, 0, 0, Math.PI * 2); ctx.fill();
    // Legs
    roundRect(ctx, -4, -12, 3, 12, 1.5, '#333', null);
    roundRect(ctx,  1, -12, 3, 12, 1.5, '#333', null);
    // Skirt (flared trapezoid)
    ctx.fillStyle = '#004422';
    ctx.beginPath(); ctx.moveTo(-8,0); ctx.lineTo(-6,-22); ctx.lineTo(6,-22); ctx.lineTo(8,0); ctx.closePath(); ctx.fill();
    // White apron over skirt
    ctx.fillStyle = 'rgba(240,240,220,0.9)';
    ctx.beginPath(); ctx.moveTo(-4,-2); ctx.lineTo(-3,-20); ctx.lineTo(3,-20); ctx.lineTo(4,-2); ctx.closePath(); ctx.fill();
    // Blouse
    roundRect(ctx, -5, -32, 10, 11, 3, '#006644', '#004422');
    // Arms
    roundRect(ctx, -8, -32, 4, 9, 2, '#006644', null);
    ctx.save(); ctx.translate(6, -28); ctx.rotate(0.3);
    roundRect(ctx, -2, 0, 4, 9, 2, '#006644', null); ctx.restore();
    // Mug in right hand
    roundRect(ctx, 9, -26, 6, 5, 1, '#c8a87a', '#886644');
    ctx.strokeStyle = '#886644'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(12, -23, 2.5, -0.4, 0.4); ctx.stroke();
    // Head (circle)
    ctx.fillStyle = '#f0c888';
    ctx.beginPath(); ctx.arc(0, -38, 6.5, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#d4a870'; ctx.lineWidth = 0.5; ctx.stroke();
    // Hair bun (arc shape on top)
    ctx.fillStyle = '#cc3300';
    ctx.beginPath(); ctx.arc(0, -44, 5, Math.PI, 0); ctx.fill();
    ctx.beginPath(); ctx.arc(0, -44, 3, 0, Math.PI * 2); ctx.fill();
    // Side hair arcs
    ctx.beginPath(); ctx.arc(-6.5, -40, 3, 0.5, Math.PI - 0.5); ctx.fill();
    ctx.beginPath(); ctx.arc( 6.5, -40, 3, 0.5, Math.PI - 0.5); ctx.fill();
    // Eyes & smile
    npcEyes(0, -38);
    ctx.strokeStyle = '#cc4444'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(0, -36.5, 2.5, 0.2, Math.PI - 0.2); ctx.stroke();
  }

  else if (type === 'father_callahan') {
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath(); ctx.ellipse(0, 0, 8, 2.5, 0, 0, Math.PI * 2); ctx.fill();
    // Cassock (flared robe with curved hem)
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath();
    ctx.moveTo(-8, 0); ctx.bezierCurveTo(-10, -5, -9, -30, -8, -32);
    ctx.lineTo(8, -32); ctx.bezierCurveTo(9, -30, 10, -5, 8, 0);
    ctx.closePath(); ctx.fill();
    // White collar
    roundRect(ctx, -3, -32, 6, 5, 1, PALETTE.white, '#ccc');
    // Cross on chest
    ctx.strokeStyle = PALETTE.gold; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(0, -28); ctx.lineTo(0, -23); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-2.5, -26); ctx.lineTo(2.5, -26); ctx.stroke();
    // Arms (cassock sleeves)
    roundRect(ctx, -11, -32, 4, 12, 2, '#1a1a1a', null);
    roundRect(ctx,  7, -32, 4, 12, 2, '#1a1a1a', null);
    // Rosary (small dots on left arm)
    ctx.fillStyle = '#888';
    for (let i = 0; i < 4; i++) {
      ctx.beginPath(); ctx.arc(-9, -28 + i * 2.5, 0.8, 0, Math.PI * 2); ctx.fill();
    }
    // Head
    ctx.fillStyle = '#e8c8a0';
    ctx.beginPath(); ctx.arc(0, -39, 6, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#c8a880'; ctx.lineWidth = 0.5; ctx.stroke();
    // Grey tonsure hair (arc)
    ctx.fillStyle = '#aaa';
    ctx.beginPath(); ctx.arc(0, -39, 6, Math.PI, 0); ctx.fill();
    ctx.fillStyle = '#e8c8a0';
    ctx.beginPath(); ctx.arc(0, -41, 3.5, 0, Math.PI * 2); ctx.fill();
    // Eyes & gentle smile
    npcEyes(0, -39);
    ctx.strokeStyle = '#aa8866'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(0, -37.5, 2.5, 0.2, Math.PI - 0.2); ctx.stroke();
  }

  else if (type === 'seamus') {
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath(); ctx.ellipse(0, 0, 8, 2.5, 0, 0, Math.PI * 2); ctx.fill();
    // Boots
    roundRect(ctx, -5, -3,  5, 3, 1.5, '#2a1a0a', null);
    roundRect(ctx,  1, -3,  5, 3, 1.5, '#2a1a0a', null);
    // Legs
    roundRect(ctx, -4, -12, 3, 10, 1.5, '#4a4a6a', null);
    roundRect(ctx,  1, -12, 3, 10, 1.5, '#4a4a6a', null);
    // Overalls body
    roundRect(ctx, -6, -28, 12, 17, 3, '#4a6a8a', '#2a4a6a');
    // Overalls straps
    ctx.fillStyle = '#4a6a8a';
    ctx.fillRect(-3, -34, 2, 7); ctx.fillRect(1, -34, 2, 7);
    // Shirt
    roundRect(ctx, -5, -37, 10, 10, 2, '#cc8844', null);
    // Arms
    roundRect(ctx, -9, -37, 4, 11, 2, '#cc8844', null);
    // Right arm holds pipe
    ctx.save(); ctx.translate(6, -35); ctx.rotate(0.4);
    roundRect(ctx, -2, 0, 4, 11, 2, '#cc8844', null); ctx.restore();
    // Pipe in hand
    ctx.strokeStyle = '#5a3010'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(9, -28); ctx.lineTo(14, -26); ctx.stroke();
    ctx.beginPath(); ctx.arc(14, -25, 2, 0, Math.PI * 2); ctx.stroke();
    // Head (weathered)
    ctx.fillStyle = '#d4a87a';
    ctx.beginPath(); ctx.arc(0, -43, 6.5, 0, Math.PI * 2); ctx.fill();
    // Wrinkle lines
    ctx.strokeStyle = '#b0906a'; ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(-3, -44); ctx.lineTo(-4.5, -44); ctx.stroke();
    ctx.beginPath(); ctx.moveTo( 3, -44); ctx.lineTo( 4.5, -44); ctx.stroke();
    // Grey flat cap (arc-based)
    ctx.fillStyle = '#888';
    ctx.beginPath(); ctx.arc(0, -44, 6.5, Math.PI, 0); ctx.fill();
    ctx.beginPath(); ctx.ellipse(0, -44, 8.5, 2, 0, 0, Math.PI * 2); ctx.fill();
    // Bushy grey beard (larger ellipse)
    ctx.fillStyle = '#aaa';
    ctx.beginPath(); ctx.ellipse(0, -38.5, 5.5, 3.5, 0, 0, Math.PI); ctx.fill();
    // Eyes
    npcEyes(0, -43);
  }

  else if (type === 'maggie') {
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath(); ctx.ellipse(0, 0, 8, 2.5, 0, 0, Math.PI * 2); ctx.fill();
    // Legs
    roundRect(ctx, -3, -12, 3, 12, 1.5, '#333', null);
    roundRect(ctx,  1, -12, 3, 12, 1.5, '#333', null);
    // Skirt (flared)
    ctx.fillStyle = PALETTE.emerald;
    ctx.beginPath(); ctx.moveTo(-8,0); ctx.lineTo(-6,-18); ctx.lineTo(6,-18); ctx.lineTo(8,0); ctx.closePath(); ctx.fill();
    // Orange safety vest
    roundRect(ctx, -6, -30, 12, 13, 3, '#ff6600', '#cc4400');
    // Arms
    roundRect(ctx, -9, -30, 4, 11, 2, '#ff6600', null);
    // Right arm holding clipboard
    ctx.save(); ctx.translate(5, -30); ctx.rotate(0.1);
    roundRect(ctx, -2, 0, 4, 11, 2, '#ff6600', null); ctx.restore();
    // Clipboard
    roundRect(ctx, 7, -27, 8, 11, 1, PALETTE.cream, '#888');
    roundRect(ctx, 8.5, -28.5, 5, 2.5, 0.5, '#888', null);
    ctx.strokeStyle = '#555'; ctx.lineWidth = 0.7;
    ctx.beginPath(); ctx.moveTo(9,-24); ctx.lineTo(14,-24); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(9,-22); ctx.lineTo(14,-22); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(9,-20); ctx.lineTo(12,-20); ctx.stroke();
    // Head
    ctx.fillStyle = '#f0c888';
    ctx.beginPath(); ctx.arc(0, -37, 6, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#d4a870'; ctx.lineWidth = 0.5; ctx.stroke();
    // Brown hair with ponytail
    ctx.fillStyle = '#664422';
    ctx.beginPath(); ctx.arc(0, -37, 6, Math.PI, 0); ctx.fill();
    // Side hair arcs
    ctx.beginPath(); ctx.arc(-6, -39, 2.5, 0.5, Math.PI - 0.3); ctx.fill();
    // Ponytail
    ctx.beginPath(); ctx.arc(7, -40, 2.5, -0.5, 1.5); ctx.fill();
    // Eyes & smile
    npcEyes(0, -37);
    ctx.strokeStyle = '#cc4444'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(0, -35.5, 2.5, 0.2, Math.PI - 0.2); ctx.stroke();
  }

  else if (type === 'marshal') {
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath(); ctx.ellipse(0, 0, 9, 2.5, 0, 0, Math.PI * 2); ctx.fill();
    // Formal trousers
    roundRect(ctx, -4, -14, 4, 14, 1.5, '#222', null);
    roundRect(ctx,  1, -14, 4, 14, 1.5, '#222', null);
    // Formal coat (tailed)
    ctx.fillStyle = '#1a1a2a';
    ctx.beginPath();
    ctx.moveTo(-8,0); ctx.lineTo(-8,-34); ctx.lineTo(8,-34); ctx.lineTo(8,0);
    ctx.lineTo(5,-8); ctx.lineTo(-5,-8); ctx.closePath(); ctx.fill();
    // Green sash (bezier stripe)
    ctx.save();
    ctx.strokeStyle = PALETTE.emerald; ctx.lineWidth = 6; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(-10,-27); ctx.bezierCurveTo(-5,-22, 5,-18, 10,-13); ctx.stroke();
    ctx.restore();
    // White shirt/cravat
    ctx.fillStyle = PALETTE.white;
    ctx.beginPath(); ctx.moveTo(-2,-34); ctx.lineTo(-3,-26); ctx.lineTo(0,-24); ctx.lineTo(3,-26); ctx.lineTo(2,-34); ctx.closePath(); ctx.fill();
    // Arms
    roundRect(ctx, -11, -34, 4, 13, 2, '#1a1a2a', null);
    roundRect(ctx,   7, -34, 4, 13, 2, '#1a1a2a', null);
    // White gloves
    roundRect(ctx, -12, -22, 4, 5, 2, PALETTE.white, '#ccc');
    roundRect(ctx,   8, -22, 4, 5, 2, PALETTE.white, '#ccc');
    // Head
    ctx.fillStyle = '#e8c8a0';
    ctx.beginPath(); ctx.arc(0, -41, 6, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#c8a880'; ctx.lineWidth = 0.5; ctx.stroke();
    // Top hat (tall path)
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.moveTo(-8,-44); ctx.lineTo(8,-44); ctx.lineTo(6,-58); ctx.lineTo(-6,-58); ctx.closePath(); ctx.fill();
    // Hat brim
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath(); ctx.moveTo(-9,-44); ctx.lineTo(9,-44); ctx.lineTo(8,-42); ctx.lineTo(-8,-42); ctx.closePath(); ctx.fill();
    // Hat band
    ctx.fillStyle = PALETTE.emerald; ctx.fillRect(-6, -49, 12, 3);
    // Moustache
    ctx.fillStyle = '#555';
    ctx.beginPath(); ctx.ellipse(-2, -36, 2.5, 1, -0.2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse( 2, -36, 2.5, 1,  0.2, 0, Math.PI * 2); ctx.fill();
    // Eyes
    npcEyes(0, -41);
  }

  else if (type === 'race_director') {
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath(); ctx.ellipse(0, 0, 8, 2.5, 0, 0, Math.PI * 2); ctx.fill();
    // Legs
    roundRect(ctx, -3, -12, 3, 12, 1.5, '#333', null);
    roundRect(ctx,  1, -12, 3, 12, 1.5, '#333', null);
    // Running shorts
    ctx.fillStyle = '#003366';
    ctx.beginPath(); ctx.moveTo(-6,0); ctx.lineTo(-4,-16); ctx.lineTo(4,-16); ctx.lineTo(6,0); ctx.closePath(); ctx.fill();
    // Reflective safety vest (orange-yellow)
    roundRect(ctx, -6, -28, 12, 13, 3, '#ff9900', '#cc6600');
    // Reflective stripes on vest
    ctx.strokeStyle = 'rgba(255,255,150,0.8)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(-6, -22); ctx.lineTo(6, -22); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-6, -19); ctx.lineTo(6, -19); ctx.stroke();
    // Left arm (straight down)
    roundRect(ctx, -9, -28, 4, 10, 2, '#ff9900', null);
    // Right arm holding clipboard (slightly angled)
    ctx.save(); ctx.translate(5, -27); ctx.rotate(0.15);
    roundRect(ctx, -2, 0, 4, 10, 2, '#ff9900', null); ctx.restore();
    // Clipboard in right hand
    roundRect(ctx, 7, -26, 9, 12, 1, PALETTE.cream, '#888');
    roundRect(ctx, 8.5, -27.5, 6, 2.5, 0.5, '#888', null);
    ctx.strokeStyle = '#555'; ctx.lineWidth = 0.7;
    ctx.beginPath(); ctx.moveTo(9,-23); ctx.lineTo(15,-23); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(9,-21); ctx.lineTo(15,-21); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(9,-19); ctx.lineTo(13,-19); ctx.stroke();
    // Whistle on cord around neck
    ctx.strokeStyle = '#cc8800'; ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.moveTo(-2,-28); ctx.bezierCurveTo(-5,-24,-3,-22,-1,-22); ctx.stroke();
    ctx.fillStyle = '#ccaa00';
    ctx.beginPath(); ctx.ellipse(-1,-21,2,1,0.3,0,Math.PI*2); ctx.fill();
    // Head
    ctx.fillStyle = '#e8c8a0';
    ctx.beginPath(); ctx.arc(0, -35, 6, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#c8a880'; ctx.lineWidth = 0.5; ctx.stroke();
    // Cap (baseball-style brim)
    ctx.fillStyle = '#003366';
    ctx.beginPath(); ctx.arc(0, -35, 6, Math.PI, 0); ctx.fill();
    ctx.beginPath(); ctx.ellipse(0, -35, 8, 2, 0, 0, Math.PI * 2); ctx.fill();
    // Cap brim peak forward
    ctx.fillStyle = '#002244';
    ctx.beginPath(); ctx.moveTo(-3,-35); ctx.lineTo(10,-35); ctx.lineTo(9,-33); ctx.lineTo(-2,-33); ctx.closePath(); ctx.fill();
    // Eyes
    npcEyes(0, -35);
    // Small moustache
    ctx.fillStyle = '#555';
    ctx.beginPath(); ctx.ellipse(-2,-32,2,0.8,-0.1,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse( 2,-32,2,0.8, 0.1,0,Math.PI*2); ctx.fill();
  }

  ctx.restore();
}

function drawShamrock(ctx, x, y, size = 8, color = PALETTE.emerald) {
  ctx.save();
  ctx.translate(x, y);
  // Derive a darker outline color
  const r = parseInt(color.slice(1,3)||'0',16), g = parseInt(color.slice(3,5)||'aa',16), b = parseInt(color.slice(5,7)||'44',16);
  const dark = `rgba(${Math.max(0,r-40)},${Math.max(0,g-60)},${Math.max(0,b-20)},1)`;
  // Three lobes
  ctx.fillStyle = color;
  ctx.strokeStyle = dark; ctx.lineWidth = 0.8;
  for (let i = 0; i < 3; i++) {
    ctx.save();
    ctx.rotate((i * Math.PI * 2) / 3 - Math.PI / 2);
    ctx.beginPath(); ctx.arc(0, -size * 0.6, size * 0.55, 0, Math.PI * 2);
    ctx.fill(); ctx.stroke();
    // Highlight dot
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.beginPath(); ctx.arc(-size * 0.18, -size * 0.7, size * 0.16, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = color;
    ctx.restore();
  }
  // Stem (tapered bezier)
  ctx.strokeStyle = color; ctx.lineWidth = size * 0.22;
  ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(0, 0); ctx.bezierCurveTo(size*0.3, size*0.4, -size*0.1, size*0.7, size*0.1, size); ctx.stroke();
  ctx.restore();
}

function drawItemIcon(ctx, x, y, itemId) {
  ctx.save();
  ctx.translate(x, y);
  switch (itemId) {
    case 'shamrock_bouquet': {
      // Drop shadow
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.beginPath(); ctx.ellipse(0, 6, 9, 3, 0, 0, Math.PI * 2); ctx.fill();
      // Three shamrocks in a cluster
      drawShamrock(ctx, -8, -2, 7, PALETTE.emerald);
      drawShamrock(ctx,  8, -2, 7, PALETTE.emerald);
      drawShamrock(ctx,  0, -6, 7, PALETTE.emerald);
      // Brown stem tied with bezier
      ctx.strokeStyle = '#5a3010'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(-4, 2); ctx.bezierCurveTo(-2, 5, 2, 5, 4, 2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, 3); ctx.lineTo(0, 10); ctx.stroke();
      break;
    }
    case 'parade_banner': {
      // Pole with brass tip

      }
      break;
    }
    case 'green_bulb': {
      // Glow radial
      const glow = ctx.createRadialGradient(0, -6, 1, 0, -6, 12);
      glow.addColorStop(0, 'rgba(0,255,100,0.3)'); glow.addColorStop(1, 'rgba(0,255,100,0)');

      // Highlight

      ctx.beginPath(); ctx.arc(-2, -9, 2.5, 0, Math.PI * 2); ctx.fill();
      // Filament lines inside

      ctx.beginPath(); ctx.moveTo(-2,-4); ctx.lineTo(0,-8); ctx.lineTo(2,-4); ctx.stroke();
      // Screw base with threading
      roundRect(ctx, -3.5, 0, 7, 4, 1, PALETTE.stone, '#886644');
      ctx.strokeStyle = '#886644'; ctx.lineWidth = 0.7;
      ctx.beginPath(); ctx.moveTo(-3.5, 1.5); ctx.lineTo(3.5, 1.5); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(-3.5, 3); ctx.lineTo(3.5, 3); ctx.stroke();
      roundRect(ctx, -2.5, 4, 5, 3, 1, PALETTE.grey, '#555');
      break;
    }
    case 'race_bib': {
      // White bib rectangle with rounded corners
      roundRect(ctx, -11, -10, 22, 18, 2, PALETTE.white, '#aaa');
      // Green stripe across top of bib
      ctx.fillStyle = PALETTE.emerald;
      ctx.fillRect(-11, -10, 22, 5);

      ctx.fillStyle = PALETTE.emerald;
      ctx.font = 'bold 10px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('1', 0, 5);
      ctx.textAlign = 'left';

      ctx.fillStyle = '#888';
      ctx.beginPath(); ctx.arc(-9, -8, 1.2, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc( 9, -8, 1.2, 0, Math.PI * 2); ctx.fill();

      ctx.beginPath(); ctx.arc( 9,  6, 1.2, 0, Math.PI * 2); ctx.fill();
      // Drop shadow
      ctx.fillStyle = 'rgba(0,0,0,0.12)';
      ctx.beginPath(); ctx.ellipse(0, 10, 10, 2, 0, 0, Math.PI * 2); ctx.fill();
      break;
    }
  }
  ctx.restore();
}

function wrapText(ctx, text, x, y, maxW, lineH) {
  const words = text.split(' ');
  let line = '';
  let cy = y;
  for (const word of words) {
    const test = line + word + ' ';
    if (ctx.measureText(test).width > maxW && line !== '') {
      ctx.fillText(line.trim(), x, cy);
      line = word + ' ';
      cy += lineH;
    } else {
      line = test;
    }
  }
  if (line.trim()) { ctx.fillText(line.trim(), x, cy); cy += lineH; }
  return cy;
}

function drawBgParade(ctx) {
  // Bright clear sky gradient (deep blue → pale near horizon)
  const skyGrad = ctx.createLinearGradient(0,0,0,120);
  skyGrad.addColorStop(0,'#2266aa'); skyGrad.addColorStop(0.7,'#55aadd'); skyGrad.addColorStop(1,'#aaddee');
  ctx.fillStyle = skyGrad; ctx.fillRect(0,0,320,140);

  // Sun (radial gradient glow + longer rays)
  const sunGlow = ctx.createRadialGradient(270,30,4,270,30,35);
  sunGlow.addColorStop(0,'rgba(255,240,100,0.9)'); sunGlow.addColorStop(0.5,'rgba(255,220,50,0.3)'); sunGlow.addColorStop(1,'rgba(255,220,50,0)');
  ctx.fillStyle = sunGlow; ctx.beginPath(); ctx.arc(270,30,35,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ffee44'; ctx.beginPath(); ctx.arc(270,30,18,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#ffee44'; ctx.lineWidth = 2;
  for (let a=0; a<Math.PI*2; a+=Math.PI/8) {
    const inner = 21, outer = 28 + (Math.floor(a/(Math.PI/4))%2)*5;
    ctx.beginPath(); ctx.moveTo(270+Math.cos(a)*inner,30+Math.sin(a)*inner);
    ctx.lineTo(270+Math.cos(a)*outer,30+Math.sin(a)*outer); ctx.stroke();
  }

  // Background buildings
  ctx.fillStyle = '#d0c8b8'; ctx.fillRect(0,50,80,80);
  ctx.fillStyle = '#c8bca8'; ctx.fillRect(240,40,80,100);
  ctx.fillStyle = '#b8aaa0'; ctx.fillRect(160,55,70,75);

  // Crowd (left) with distinct color hats and waving arms
  const hatColors = ['#aa2200','#00aa44','#2244aa','#884400','#880088','#448800','#aa6600'];
  for (let pi=0,px=5; px<130; px+=11, pi++) {
    const ph = 22 + (px % 14);
    ctx.fillStyle = '#334'; ctx.fillRect(px,115-ph,7,ph);
    ctx.beginPath(); ctx.arc(px+3.5,112-ph,4.5,0,Math.PI*2); ctx.fill();
    // Hat
    ctx.fillStyle = hatColors[pi%hatColors.length]; ctx.fillRect(px-1,108-ph,9,5);
    // Waving arm (arc)
    ctx.strokeStyle = '#334'; ctx.lineWidth = 1.5;
    if (pi%2===0) { ctx.beginPath(); ctx.moveTo(px+1,110-ph); ctx.lineTo(px-4,100-ph); ctx.stroke(); }
    else          { ctx.beginPath(); ctx.moveTo(px+5,110-ph); ctx.lineTo(px+10,100-ph); ctx.stroke(); }
    // Mini Irish flag
    if (pi%3===0) {
      ctx.fillStyle = PALETTE.emerald; ctx.fillRect(px-4,96-ph,4,3);
      ctx.fillStyle = PALETTE.white;   ctx.fillRect(px-4,99-ph,4,3);
      ctx.fillStyle = PALETTE.orange;  ctx.fillRect(px-4,102-ph,4,3);
      ctx.fillStyle = '#888'; ctx.fillRect(px-5,94-ph,1,12);
    }
  }
  // Crowd (right)
  for (let pi=0,px=200; px<315; px+=10, pi++) {
    const ph = 22 + (px % 13);
    ctx.fillStyle = '#445'; ctx.fillRect(px,115-ph,7,ph);
    ctx.beginPath(); ctx.arc(px+3.5,112-ph,4.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = hatColors[(pi+3)%hatColors.length]; ctx.fillRect(px-1,108-ph,9,5);
    ctx.strokeStyle = '#445'; ctx.lineWidth = 1.5;
    if (pi%2===0) { ctx.beginPath(); ctx.moveTo(px+1,110-ph); ctx.lineTo(px+8,100-ph); ctx.stroke(); }
  }

  // Ground / street
  const groundGrad = ctx.createLinearGradient(0,138,0,195);
  groundGrad.addColorStop(0,'#aaaaaa'); groundGrad.addColorStop(1,'#777777');
  ctx.fillStyle = groundGrad; ctx.fillRect(0,138,320,57);
  ctx.fillStyle = '#888';
  for (let sx=0; sx<320; sx+=32) ctx.fillRect(sx,140,30,55);

  // Parade float (arc-decorated front, floral fringe)
  ctx.fillStyle = PALETTE.emerald; ctx.fillRect(100,100,140,50);
  ctx.fillStyle = '#009944'; ctx.fillRect(100,98,140,8);
  // Curved front of float
  ctx.fillStyle = '#00bb44';
  ctx.beginPath(); ctx.moveTo(100,100); ctx.bezierCurveTo(100,90,115,88,125,98); ctx.lineTo(125,150); ctx.lineTo(100,150); ctx.closePath(); ctx.fill();
  // Floral fringe along bottom
  ctx.fillStyle = PALETTE.gold;
  for (let fx=110; fx<235; fx+=18) {
    ctx.fillRect(fx,100,4,50);
    drawShamrock(ctx,fx+2,96,5,PALETTE.gold);
    // Fringe dots
    ctx.beginPath(); ctx.arc(fx+2,150,3,0,Math.PI); ctx.fill();
  }
  // Float wheels
  ctx.fillStyle = '#222'; ctx.beginPath(); ctx.arc(125,150,12,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(215,150,12,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#555'; ctx.beginPath(); ctx.arc(125,150,6,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(215,150,6,0,Math.PI*2); ctx.fill();

  // Street signs
  ctx.fillStyle = PALETTE.grey; ctx.fillRect(45,85,4,60);
  ctx.fillStyle = PALETTE.emerald; ctx.fillRect(20,80,60,14);
  ctx.fillStyle = PALETTE.white; ctx.font = '6px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('MULBERRY ST',23,90);
  ctx.fillStyle = PALETTE.grey; ctx.fillRect(280,85,4,60);
  ctx.fillStyle = PALETTE.emerald; ctx.fillRect(255,80,70,14);
  ctx.fillStyle = PALETTE.white; ctx.fillText('WYOMING AVE',258,90);

  // Irish flags on poles
  for (let ff=0; ff<320; ff+=40) {
    ctx.fillStyle = '#333'; ctx.fillRect(ff+2,95,2,30);
    ctx.fillStyle = PALETTE.emerald; ctx.fillRect(ff+4,95,8,12);
    ctx.fillStyle = PALETTE.white;   ctx.fillRect(ff+12,95,8,12);
    ctx.fillStyle = PALETTE.orange;  ctx.fillRect(ff+20,95,8,12);
  }

  // Marching band (bright red, gold epaulettes, trombone + drum)
  for (let bp=278, bi=0; bp<315; bp+=12, bi++) {
    ctx.fillStyle = '#990000'; ctx.fillRect(bp,115,8,28);
    ctx.beginPath(); ctx.arc(bp+4,112,5,0,Math.PI*2); ctx.fill();
    // Gold epaulette
    ctx.fillStyle = PALETTE.gold; ctx.fillRect(bp-1,115,10,5);
    // Instrument
    if (bi%2===0) {
      // Trombone slide
      ctx.strokeStyle = '#aaa'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(bp+8,120); ctx.lineTo(bp+18,116); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(bp+8,123); ctx.lineTo(bp+18,119); ctx.stroke();
    } else {
      // Drum (circle)
      ctx.strokeStyle = '#ddd'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(bp-4,124,4,0,Math.PI*2); ctx.stroke();
      ctx.fillStyle = '#fff'; ctx.fillRect(bp-5,123,1,2); ctx.fillRect(bp-3,123,1,2);
    }
  }
}

  return px >= rect.x && px <= rect.x + rect.w && py >= rect.y && py <= rect.y + rect.h;
