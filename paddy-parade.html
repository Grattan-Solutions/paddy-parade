class DialogueSystem {
  constructor(game) {
    this.game = game;
    this.active = false;
    this.lines = [];
    this.lineIndex = 0;
    this.npcName = '';
    this.npcType = '';
    this.resolve = null;
    this.tapReady = false;
    this.tapCount = 0;
    this.quizActive = false;
    this.quizData = null;
    this.quizSelected = null;
    this.quizFeedback = null;
    this.quizFeedbackTimer = 0;
    this.quizResolve = null;
  }

  async run(dialogueId, npcType, npcName) {
    const tree = DIALOGUES[dialogueId];
    if (!tree) return;

    this.active = true;
    this.npcType = npcType;
    this.npcName = npcName;
    this.game.mode = 'dialogue';

    // Check if this dialogue has been completed using the farewell node's doneFlag
    const farewell = tree.farewell;
    const isDone = farewell && farewell.doneFlag && this.game.state.getFlag(farewell.doneFlag);
    const nodeId = (isDone && tree.already_done) ? 'already_done' : 'root';
    await this.runNode(tree, nodeId);

    this.active = false;
    this.game.mode = 'play';
  }

  async runNode(tree, nodeId) {
    const node = tree[nodeId];
    if (!node) return;

    if (node.lines) {
      await this.showLines(node.lines);
    }

    if (node.quiz) {
      await this.showQuiz(node.quiz);
    }

    if (node.quizFromBank) {
      const { scene } = node.quizFromBank;
      const qs = this.game.sessionQuestions[scene] || [];
      const ptr = this.game.sessionQuestionPtrs[scene] || 0;
      const q = qs[ptr];
      this.game.sessionQuestionPtrs[scene] = ptr + 1;
      if (q) await this.showQuiz(q);
    }

    if (node.doneFlag) {
      this.game.state.setFlag(node.doneFlag, true);
    }

    if (node.checkItems) {
      const hasAll = ['has_shamrock','has_banner','has_horseshoe','has_bulb','has_bib']
        .every(f => this.game.state.getFlag(f));
      await this.runNode(tree, hasAll ? 'items_ready' : 'items_missing');
      return;
    }

    if (node.winGame) {
      this.game.state.setFlag('parade_started', true);
      return;
    }

    if (node.next) {
      await this.runNode(tree, node.next);
    }
  }

  showLines(lines) {
    return new Promise(resolve => {
      this.lines = Array.isArray(lines) ? lines : [lines];
      this.lineIndex = 0;
      this.resolve = resolve;
      this.tapReady = false;
      this.tapCount = 0;
    });
  }

  showQuiz(quizData) {
    return new Promise(resolve => {
      this.quizActive = true;
      this.quizData = quizData;
      this.quizSelected = null;
      this.quizFeedback = null;
      this.quizFeedbackTimer = 0;
      this.quizResolve = resolve;
    });
  }

  handleTap(x, y) {
    if (!this.active) return false;

    if (this.quizActive) {
      this._handleQuizTap(x, y);
      return true;
    }

    if (this.lines.length > 0) {
      if (this.quizFeedbackTimer > 0) return true;
      // Skip button (bottom-right of dialogue box): x 228..298, y 168..180
      if (this.tapCount >= 1 && x >= 228 && x <= 298 && y >= 168 && y <= 180) {
        this.lines = [];
        this.lineIndex = 0;
        this.tapCount = 0;
        const r = this.resolve;
        this.resolve = null;
        if (r) r();
        return true;
      }
      this.tapCount++;
      this.lineIndex++;
      if (this.lineIndex >= this.lines.length) {
        this.lines = [];
        this.lineIndex = 0;
        this.tapCount = 0;
        const r = this.resolve;
        this.resolve = null;
        if (r) r();
      }
      return true;
    }
    return false;
  }

  // Shared feedback panel coords — used by both _handleQuizTap and _renderQuiz
  static get FEEDBACK_BTN() {
    return { x: W / 2 - 42, y: 216, w: 84, h: 14 };
  }

  _handleQuizTap(x, y) {
    if (this.quizFeedback) {
      // Only the OK/Continue button dismisses feedback
      const btn = DialogueSystem.FEEDBACK_BTN;
      if (x >= btn.x && x <= btn.x + btn.w && y >= btn.y && y <= btn.y + btn.h) {
        if (this.quizFeedback.correct) {
          this.quizActive = false;
          this.quizData = null;
          this.quizFeedback = null;
          this.quizSelected = null;
          const r = this.quizResolve;
          this.quizResolve = null;
          if (r) r(true);
        } else {
          // Wrong answer — clear feedback so player can try again
          this.quizFeedback = null;
          this.quizSelected = null;
        }
      }
      return;
    }
    const optCount = this.quizData.options.length;
    const bh = 30, bw = 260, bx = 30, by0 = 92, optionGap = 3;
    for (let i = 0; i < optCount; i++) {
      const by = by0 + i * (bh + optionGap);
      if (x >= bx && x <= bx + bw && y >= by && y <= by + bh) {
        this.quizSelected = i;
        const correct = (i === this.quizData.correct);
        if (correct) {
          const pts = Math.round(10 * (this.game.scoreMultiplier || 1));
          this.game.state.addScore(pts);
          if (this.quizData.flag) this.game.state.setFlag(this.quizData.flag, true);
          if (this.quizData.id) this.game.state.setFlag(`answered_${this.quizData.id}`, true);
          this.quizFeedback = { correct: true, msg: `+${pts} points! Well done!` };
          if (navigator.vibrate) navigator.vibrate(50);
          sound.correct();
          this.game._saveState();
        } else {
          this.quizFeedback = { correct: false, msg: this.quizData.hint };
          if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
          sound.wrong();
        }
        break;
      }
    }
  }

  update(dt) {
    // Feedback is now dismissed by tapping the OK button — no timer needed
  }

  render(ctx) {
    if (this.quizActive) {
      this._renderQuiz(ctx);
      return;
    }
    if (this.lines.length > 0 && this.lineIndex < this.lines.length) {
      this._renderDialogue(ctx);
    }
  }

  _renderDialogue(ctx) {
    const text = this.lines[this.lineIndex];
    const bx = 10, by = VIEWPORT_H - 70, bw = 300, bh = 65;
    roundRect(ctx, bx, by, bw, bh, 6, PALETTE.popupBg, PALETTE.popupBorder);
    // NPC name tag
    roundRect(ctx, bx + 6, by - 10, 80, 14, 4, PALETTE.darkGreen, PALETTE.popupBorder);
    ctx.fillStyle = PALETTE.gold;
    ctx.font = 'bold 7px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(this.npcName, bx + 10, by - 2);
    // Text
    ctx.fillStyle = PALETTE.white;
    ctx.font = '8px sans-serif';
    wrapText(ctx, text, bx + 8, by + 12, bw - 16, 10);
    // Advance hint
    ctx.fillStyle = PALETTE.emerald;
    ctx.font = '7px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText('Tap to continue ▶', bx + bw - 6, by + bh - 5);
    // Skip button (appears after first tap)
    if (this.tapCount >= 1) {
      roundRect(ctx, 228, 168, 70, 12, 2, 'rgba(0,30,0,0.85)', PALETTE.popupBorder);
      ctx.fillStyle = PALETTE.grassGreen;
      ctx.font = '6px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Skip \u25b6\u25b6', 263, 177);
    }
    ctx.textAlign = 'left';
  }

  _renderQuiz(ctx) {
    // Full screen overlay
    ctx.fillStyle = 'rgba(0,15,0,0.92)';
    ctx.fillRect(0, 0, W, H);

    // Title bar (compact: y=4, h=18)
    roundRect(ctx, 20, 4, 280, 18, 5, PALETTE.darkGreen, PALETTE.popupBorder);
    ctx.fillStyle = PALETTE.gold;
    ctx.font = 'bold 9px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('☘  QUIZ TIME!  ☘', W / 2, 16);

    // Question panel background
    roundRect(ctx, 10, 26, 300, 60, 4, 'rgba(0,30,0,0.7)', '#225522');
    ctx.fillStyle = PALETTE.white;
    ctx.font = '8px sans-serif';
    ctx.textAlign = 'left';
    const qEndY = wrapText(ctx, this.quizData.question, 16, 36, 288, 10);

    // "Tap an answer" hint between question and options
    ctx.fillStyle = PALETTE.emerald;
    ctx.font = '7px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Tap an answer:', W / 2, Math.min(qEndY + 4, 86));

    // Options (compact: by0=92, gap=3)
    const bh = 30, bw = 260, bx = 30, by0 = 92, optionGap = 3;
    const labels = ['A', 'B', 'C', 'D'];
    for (let i = 0; i < this.quizData.options.length; i++) {
      const by = by0 + i * (bh + optionGap);
      let fill = PALETTE.darkGreen, stroke = PALETTE.popupBorder;
      if (this.quizSelected === i && this.quizFeedback) {
        fill = this.quizFeedback.correct ? '#004400' : '#440000';
        stroke = this.quizFeedback.correct ? '#00ff44' : '#ff4444';
      }
      roundRect(ctx, bx, by, bw, bh, 5, fill, stroke);
      ctx.fillStyle = PALETTE.gold;
      ctx.font = 'bold 9px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(labels[i] + '.', bx + 8, by + 19);
      ctx.fillStyle = PALETTE.white;
      ctx.font = '8px sans-serif';
      wrapText(ctx, this.quizData.options[i], bx + 24, by + 12, bw - 30, 10);
    }

    // Feedback modal panel (covers all options to make state clear)
    if (this.quizFeedback) {
      const correct = this.quizFeedback.correct;
      const panelX = 10, panelY = 88, panelW = 300, panelH = 142;
      roundRect(ctx, panelX, panelY, panelW, panelH, 6,
        correct ? 'rgba(0,40,0,0.97)' : 'rgba(40,0,0,0.97)',
        correct ? '#00cc44' : '#cc4444');

      // Header
      ctx.fillStyle = correct ? '#00ff88' : '#ff8888';
      ctx.font = 'bold 10px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(correct ? '\u2713  Correct!' : '\u2717  Not quite!', W / 2, panelY + 20);

      // Message text (score or hint)
      ctx.fillStyle = PALETTE.white;
      ctx.font = '8px sans-serif';
      ctx.textAlign = 'center';
      wrapText(ctx, this.quizFeedback.msg, W / 2, panelY + 40, 280, 12);

      // OK / Try Again button
      const btn = DialogueSystem.FEEDBACK_BTN;
      roundRect(ctx, btn.x, btn.y, btn.w, btn.h, 3,
        correct ? '#006622' : '#662200',
        correct ? '#00ff44' : '#ff8844');
      ctx.fillStyle = PALETTE.white;
      ctx.font = 'bold 8px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(correct ? 'Continue \u25b6' : 'Try Again \u25b6', btn.x + btn.w / 2, btn.y + 10);
    }

    ctx.textAlign = 'left';
  }
}

// ═══════════════════════════════════════════════════════════════════
// SECTION 8: UI SYSTEM
// ═══════════════════════════════════════════════════════════════════

const ITEM_IDS = ['shamrock_bouquet', 'parade_banner', 'horseshoe', 'green_bulb', 'race_bib'];
const ITEM_NAMES = {
  shamrock_bouquet: 'Shamrock Bouquet',
  parade_banner: 'Parade Banner',
  horseshoe: 'Lucky Horseshoe',
  green_bulb: 'Green Light Bulb',
  race_bib: 'Race Bib',
};

class UISystem {
  constructor(game) {
    this.game = game;
    this.popup = null;      // { x, y, target, verbs }
    this.selectedItem = null;
    this.usingItem = null;  // item being used (waiting for target hotspot)
  }

  showPopup(x, y, target, verbs) {
    // Clamp so popup stays on screen
    const bw = 70, bh = verbs.length * 20 + 6;
    let px = Math.min(x, W - bw - 4);
    let py = Math.max(4, Math.min(y - bh / 2, VIEWPORT_H - bh - 4));
    this.popup = { x: px, y: py, target, verbs };
    sound.click();
  }

  closePopup() { this.popup = null; }

  handleTap(x, y) {
    if (!this.popup) return false;
    const { verbs, target } = this.popup;
    const bw = 70, bh = 18;
    const px = this.popup.x, py = this.popup.y;
    for (let i = 0; i < verbs.length; i++) {
      const by = py + 4 + i * (bh + 2);
      if (x >= px && x <= px + bw && y >= by && y <= by + bh) {
        this.closePopup();
        this.game.handleVerb(verbs[i], target);
        return true;
      }
    }
    // Tap outside popup = close
    this.closePopup();
    return false;
  }

  handleInventoryTap(x, y) {
    if (y < INVENTORY_Y) return false;
    const slotW = W / ITEM_IDS.length;
    for (let i = 0; i < ITEM_IDS.length; i++) {
      const itemId = ITEM_IDS[i];
      if (!this.game.inventory.has(itemId)) continue;
      const sx = i * slotW;
      if (x >= sx && x < sx + slotW) {
        if (this.usingItem === itemId) {
          this.usingItem = null;
        } else {
          this.usingItem = itemId;
          this.selectedItem = itemId;
        }
        return true;
      }
    }
    return false;
  }

  render(ctx) {
    this._renderInventoryBar(ctx);
    if (this.popup) this._renderPopup(ctx);
    if (this.usingItem) this._renderUsingCursor(ctx);
    this._renderHUD(ctx);
  }

  _renderInventoryBar(ctx) {
    ctx.fillStyle = '#0a2a0a';
    ctx.fillRect(0, INVENTORY_Y, W, INVENTORY_H);
    ctx.strokeStyle = PALETTE.popupBorder;
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, INVENTORY_Y); ctx.lineTo(W, INVENTORY_Y); ctx.stroke();

    const slotW = W / ITEM_IDS.length;
    for (let i = 0; i < ITEM_IDS.length; i++) {
      const itemId = ITEM_IDS[i];
      const has = this.game.inventory.has(itemId);
      const sx = i * slotW;
      // Slot background
      const isSelected = this.usingItem === itemId;
      ctx.fillStyle = isSelected ? '#004422' : '#0a1a0a';
      ctx.fillRect(sx + 1, INVENTORY_Y + 1, slotW - 2, INVENTORY_H - 2);
      if (isSelected) {
        ctx.strokeStyle = PALETTE.gold;
        ctx.lineWidth = 1.5;
        ctx.strokeRect(sx + 1, INVENTORY_Y + 1, slotW - 2, INVENTORY_H - 2);
      }
      // Item icon or placeholder
      if (has) {
        drawItemIcon(ctx, sx + slotW / 2, INVENTORY_Y + INVENTORY_H / 2, itemId);
      } else {
        // Ghost icon at 25% opacity
        ctx.globalAlpha = 0.25;
        drawItemIcon(ctx, sx + slotW / 2, INVENTORY_Y + INVENTORY_H / 2, itemId);
        ctx.globalAlpha = 1.0;
      }
      // Slot divider
      if (i > 0) {
        ctx.strokeStyle = '#224422'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(sx, INVENTORY_Y + 2); ctx.lineTo(sx, INVENTORY_Y + INVENTORY_H - 2); ctx.stroke();
      }
    }
  }

  _renderPopup(ctx) {
    const { x, y, verbs } = this.popup;
    const bw = 70, bh = 18;
    const totalH = verbs.length * (bh + 2) + 6;
    roundRect(ctx, x, y, bw, totalH, 5, PALETTE.popupBg, PALETTE.popupBorder);
    for (let i = 0; i < verbs.length; i++) {
      const by = y + 4 + i * (bh + 2);
      roundRect(ctx, x + 3, by, bw - 6, bh, 3, '#004422', PALETTE.emerald);
      ctx.fillStyle = PALETTE.white;
      ctx.font = 'bold 8px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(verbs[i].charAt(0).toUpperCase() + verbs[i].slice(1), x + bw / 2, by + 12);
      ctx.textAlign = 'left';
    }
  }

  _renderUsingCursor(ctx) {
    ctx.fillStyle = PALETTE.gold;
    ctx.font = '7px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Using: ' + ITEM_NAMES[this.usingItem], W / 2, INVENTORY_Y - 6);
    ctx.fillText('Tap a hotspot to USE it', W / 2, INVENTORY_Y - 15);
    ctx.textAlign = 'left';
  }

  _renderHUD(ctx) {
    const coinsFound = LUCKY_COINS.filter(c => this.game.state.getFlag(c.id)).length;
    const hudW = 185;
    ctx.fillStyle = 'rgba(0,20,0,0.75)';
    ctx.fillRect(W - hudW - 2, 2, hudW, 24);
    ctx.strokeStyle = PALETTE.popupBorder; ctx.lineWidth = 1;
    ctx.strokeRect(W - hudW - 2, 2, hudW, 24);
    // Score row
    drawShamrock(ctx, W - hudW + 4, 10, 4, PALETTE.emerald);
    ctx.fillStyle = PALETTE.gold;
    ctx.font = 'bold 7px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(`Score: ${this.game.state.score}`, W - hudW + 14, 12);
    ctx.fillStyle = '#ffd700';
    ctx.fillText(`\u{1FA99}${coinsFound}/6`, W - 44, 12);
    // Progress dots row: has_bib, has_shamrock, has_banner, has_horseshoe, has_bulb
    const dotFlags = ['has_shamrock', 'has_bib', 'has_banner', 'has_horseshoe', 'has_bulb'];
    const dotLabels = ['PUB', 'RACE', 'CAT', 'STM', 'LAC'];
    const dotStartX = W - hudW + 6;
    for (let di = 0; di < 5; di++) {
      const dx = dotStartX + di * 33;
      const collected = this.game.state.getFlag(dotFlags[di]);
      ctx.beginPath();
      ctx.arc(dx, 20, 3, 0, Math.PI * 2);
      ctx.fillStyle = collected ? PALETTE.gold : '#223322';
      ctx.fill();
      ctx.strokeStyle = collected ? PALETTE.gold : '#446644';
      ctx.lineWidth = 0.5;
      ctx.stroke();
      ctx.fillStyle = collected ? PALETTE.gold : '#446644';
      ctx.font = '5px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(dotLabels[di], dx, 27);
    }
    ctx.textAlign = 'left';
  }
}

// ═══════════════════════════════════════════════════════════════════
// SECTION 9: GAME ENGINE
// ═══════════════════════════════════════════════════════════════════

class Game {
  constructor(canvas) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.input = new Input(canvas);
    this.state = new GameState();
    this.inventory = new Set();
    this.dialogue = new DialogueSystem(this);
    this.ui = new UISystem(this);

    this.mode = 'title'; // 'title', 'help', 'difficulty', 'play', 'dialogue', 'transition', 'win', 'resume'
    this.helpPage = 0;
    this._helpReturnMode = 'title';
    this.difficulty = 2;       // 1=easy, 2=medium, 3=hard
    this.scoreMultiplier = 1;  // 1, 1.5, or 2
    this.sessionQuestions = {};
    this.sessionQuestionPtrs = {};
    this.currentScene = null;
    this.sceneId = null;
    this.bgCache = null;

    // Paddy position and walking
    this.paddyX = 80;
    this.paddyY = 155;
    this.paddyDir = 1;
    this.paddyTargetX = 80;
    this.paddyTargetY = 155;
    this.paddyWalking = false;
    this.paddyAnimFrame = 0;
    this.paddyAnimTimer = 0;
    this.paddyCelebrate = false;
    this.celebrateTimer = 0;

    // Walk target indicator
    this.walkTargetTimer = 0;
    this.walkTargetX = 0;
    this.walkTargetY = 0;

    // Transition
    this.transAlpha = 0;
    this.transPhase = 'none'; // 'fadeout', 'fadein', 'none'
    this.transTarget = null;
    this.transResolve = null;

    // Message display
    this.message = '';
    this.messageTimer = 0;

    this.lastTime = 0;
    this.animTimer = 0;

    // Win state
    this.winTimer = 0;
    this.confetti = [];

    // Coal cart push animation
    this.cartPushTimer = 0;
    this.cartOffset = 0;

    // Float decoration state
    this.floatDecorated = false;

    // Resume modal state
    this.resumeData = null;
  }

  start() {
    this.lastTime = performance.now();
    requestAnimationFrame(t => this.loop(t));
  }

  loop(ts) {
    const dt = Math.min((ts - this.lastTime) / 1000, 0.05);
    this.lastTime = ts;
    this.update(dt);
    this.render();
    requestAnimationFrame(t => this.loop(t));
  }

  update(dt) {
    if (this.mode === 'transition') return;

    if (this.mode === 'title') {
      this.animTimer += dt;
      const tap = this.input.consumeTap();
      if (tap) {
        sound.click();
        // How to Play button area
        if (tap.x >= 90 && tap.x <= 230 && tap.y >= 174 && tap.y <= 192) {
          this.helpPage = 0;
          this.mode = 'help';
        } else {
          this.mode = 'difficulty';
        }
      }
      return;
    }

    if (this.mode === 'difficulty') {
      this.animTimer += dt;
      const tap = this.input.consumeTap();
      if (tap) {
        // Easy button: y 90..120
        if (tap.y >= 90 && tap.y <= 120) {
          this.difficulty = 1; this.scoreMultiplier = 1;
          Storage.save('difficulty', 1); sound.click(); this._checkResume();
        }
        // Medium button: y 128..158
        else if (tap.y >= 128 && tap.y <= 158) {
          this.difficulty = 2; this.scoreMultiplier = 1.5;
          Storage.save('difficulty', 2); sound.click(); this._checkResume();
        }
        // Hard button: y 166..196
        else if (tap.y >= 166 && tap.y <= 196) {
          this.difficulty = 3; this.scoreMultiplier = 2;
          Storage.save('difficulty', 3); sound.click(); this._checkResume();
        }
        // Back button
        else if (tap.x >= 15 && tap.x <= 70 && tap.y >= H - 30 && tap.y <= H - 12) {
          this.mode = 'title';
        }
      }
      return;
    }

    if (this.mode === 'help') {
      this.animTimer += dt;
      const tap = this.input.consumeTap();
      if (tap) {
        // Back button: x 15..70, y H-30..H-12
        if (tap.x >= 15 && tap.x <= 70 && tap.y >= H - 30 && tap.y <= H - 12) {
          if (this.helpPage === 0) { this.mode = this._helpReturnMode; }
          else { this.helpPage--; }
        }
        // Next/Done button: x W-70..W-15, y H-30..H-12
        else if (tap.x >= W - 70 && tap.x <= W - 15 && tap.y >= H - 30 && tap.y <= H - 12) {
          if (this.helpPage >= 1) { this.mode = this._helpReturnMode; }
          else { this.helpPage++; }
        }
      }
      return;
    }

    if (this.mode === 'resume') {
      const tap = this.input.consumeTap();
      if (tap) {
        // Resume button: left half
        if (tap.x < W / 2) {
          this._restoreState(this.resumeData);
          this.resumeData = null;
        } else {
          // New game: right half
          this.resumeData = null;
          Storage.clear('gamestate');
          this.startGame();
        }
      }
      return;
    }

    if (this.mode === 'win') {
      this.winTimer += dt;
      // Animate confetti
      for (const c of this.confetti) {
        c.x += c.vx * dt;
        c.y += c.vy * dt;
        c.vy += 80 * dt;
        c.rot += c.vr * dt;
        if (c.y > H + 10) { c.y = -10; c.x = Math.random() * W; c.vy = 40 + Math.random() * 60; }
      }
      const tap = this.input.consumeTap();
      if (tap) {
        // Share button area (y 148..164): share score
        if (tap.y >= 148 && tap.y <= 164 && navigator.share) {
          const diffLabel = ['', 'Easy', 'Medium', 'Hard'][this.difficulty] || '';
          navigator.share({
            title: "Paddy's Parade Day Adventure",
            text: `I scored ${this.state.score} pts on ${diffLabel}! Erin Go Bragh! 🍀`,
            url: 'https://paddy-parade.vercel.app'
          }).catch(() => {});
        } else if (this.winTimer > 2) {
          this.mode = 'title';
          this.state.reset();
          this.inventory.clear();
          this.bgCache = null;
          Storage.clear('gamestate');
        }
      }
      return;
    }

    if (this.mode === 'dialogue') {
      this.dialogue.update(dt);
      const tap = this.input.peekTap();
      if (tap) {
        const consumed = this.dialogue.handleTap(tap.x, tap.y);
        if (consumed) this.input.consumeTap();
        // Check if dialogue ended
        if (!this.dialogue.active) {
          this.mode = 'play';
          if (this.state.getFlag('parade_started')) {
            this._triggerWin();
          }
        }
      }
      return;
    }

    if (this.mode === 'play') {
      this.animTimer += dt;
      // Animate Paddy
      this.paddyAnimTimer += dt;
      if (this.paddyAnimTimer > 0.15) {
        this.paddyAnimTimer = 0;
        this.paddyAnimFrame++;
      }

      if (this.celebrateTimer > 0) {
        this.celebrateTimer -= dt;
        if (this.celebrateTimer <= 0) this.paddyCelebrate = false;
      }

      // Walk Paddy toward target
      if (this.paddyWalking) {
        const dx = this.paddyTargetX - this.paddyX;
        const dy = this.paddyTargetY - this.paddyY;
        const dist = Math.hypot(dx, dy);
        const speed = 80;
        if (dist < speed * dt + 1) {
          this.paddyX = this.paddyTargetX;
          this.paddyY = this.paddyTargetY;
          this.paddyWalking = false;
        } else {
          this.paddyX += (dx / dist) * speed * dt;
          this.paddyY += (dy / dist) * speed * dt;
          this.paddyDir = dx > 0 ? 1 : -1;
        }
      }

      // Walk target timer
      if (this.walkTargetTimer > 0) this.walkTargetTimer -= dt;

      // Message timer
      if (this.messageTimer > 0) {
        this.messageTimer -= dt;
      }

      // Coal cart push animation
      if (this.cartPushTimer > 0) {
        this.cartOffset = 15 * (1 - this.cartPushTimer / 0.5);
        this.cartPushTimer -= dt;
        if (this.cartPushTimer <= 0) { this.cartPushTimer = 0; this.cartOffset = 15; }
      }

      // Handle tap
      const tap = this.input.peekTap();
      if (tap) {
        if (this._handlePlayTap(tap.x, tap.y)) {
          this.input.consumeTap();
        }
      }
    }
  }

  _handlePlayTap(x, y) {
    // 0. In-game help button (top-left "?" box, x=2..14, y=1..12)
    if (x >= 2 && x <= 14 && y >= 1 && y <= 12) {
      this._helpReturnMode = 'play';
      this.helpPage = 0;
      this.mode = 'help';
      return true;
    }

    // 1. Inventory bar?
    if (y >= INVENTORY_Y) {
      return this.ui.handleInventoryTap(x, y);
    }

    // 2. HUD score area?
    if (x >= W - 80 && y < 18) return false;

    // 3. Existing popup?
    if (this.ui.popup) {
      return this.ui.handleTap(x, y);
    }

    // 4. NPC hit?
    const scene = this.currentScene;
    if (!scene) return false;
    for (const npc of scene.npcs) {
      const npcRect = makeRect(npc.x - 14, npc.y - 55, 28, 56);
      if (rectContains(npcRect, x, y)) {
        this._walkThenDo(npc.x - 20, npc.y, () => this._talkToNPC(npc));
        return true;
      }
    }

    // 4b. Lucky Coin hit?
    for (const coin of LUCKY_COINS) {
      if (coin.scene !== this.sceneId) continue;
      if (this.state.getFlag(coin.id)) continue;
      const dx = x - coin.x, dy = y - coin.y;
      if (dx * dx + dy * dy < 100) {
        this.collectCoin(coin);
        return true;
      }
    }

    // 5. Hotspot hit?
    for (const hs of scene.hotspots) {
      if (rectContains(hs.rect, x, y)) {
        if (this.ui.usingItem) {
          // Using item on hotspot
          this._useItemOnHotspot(this.ui.usingItem, hs);
          this.ui.usingItem = null;
          return true;
        }
        let verbs = [...hs.verbs];
        // Filter 'take' if already taken or requireFlag not met
        if (hs.item && this.inventory.has(hs.item)) {
          verbs = verbs.filter(v => v !== 'take');
        }
        if (hs.requireFlag && !this.state.getFlag(hs.requireFlag)) {
          verbs = verbs.filter(v => v !== 'take');
        }
        if (hs.isExit) {
          verbs = ['go'];
        }
        if (verbs.length === 0) return false;
        this.ui.showPopup(x, y, hs, verbs);
        return true;
      }
    }

    // 6. Clear usingItem if tapping elsewhere
    if (this.ui.usingItem) {
      this.ui.usingItem = null;
      return true;
    }

    // 7. Walk to tapped point
    if (y < VIEWPORT_H) {
      this.paddyTargetX = x;
      this.paddyTargetY = Math.min(y, VIEWPORT_H - 15);
      this.paddyWalking = true;
      this.walkTargetX = this.paddyTargetX;
      this.walkTargetY = this.paddyTargetY;
      this.walkTargetTimer = 0.6;
    }
    return true;
  }

  _walkThenDo(tx, ty, fn) {
    this.paddyTargetX = tx;
    this.paddyTargetY = Math.min(ty, VIEWPORT_H - 15);
    this.paddyWalking = true;
    // Poll for arrival
    const check = () => {
      if (!this.paddyWalking) { fn(); return; }
      setTimeout(check, 50);
    };
    setTimeout(check, 50);
  }

  collectCoin(coin) {
    this.state.setFlag(coin.id, true);
    this.state.addScore(5);
    this.paddyCelebrate = true;
    this.celebrateTimer = 1.2;
    sound.coin();
    // Show dialogue box with fun fact
    const scene = this.currentScene;
    const npc = scene && scene.npcs[0];
    this.dialogue.active = true;
    this.dialogue.npcType = npc ? npc.type : 'siobhan';
    this.dialogue.npcName = '☘ Lucky Coin! +5pts';
    this.dialogue.quizActive = false;
    this.dialogue.quizFeedbackTimer = 0;
    this.dialogue.lines = [coin.dialogue];
    this.dialogue.lineIndex = 0;
    this.mode = 'dialogue';
    this.dialogue.resolve = () => {
      this.dialogue.active = false;
      this.mode = 'play';
    };
  }

  _renderPickupItems(ctx) {
    const s = this.sceneId;
    if (!s) return;
    if (s === 'footrace' && !this.state.getFlag('has_bib')) {
      // Race bib #1 on the registration table
      ctx.fillStyle = PALETTE.white;
      ctx.fillRect(10, 132, 14, 16);
      ctx.fillStyle = PALETTE.emerald;
      ctx.font = 'bold 8px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('1', 17, 143);
      ctx.textAlign = 'left';
      // Pin marks
      ctx.fillStyle = '#888';
      ctx.beginPath(); ctx.arc(11, 133, 1, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(23, 133, 1, 0, Math.PI * 2); ctx.fill();
    }
    if (s === 'pub' && !this.state.getFlag('has_shamrock')) {
      ctx.fillStyle = PALETTE.wood;
      ctx.fillRect(148, 122, 44, 6); ctx.fillRect(155, 128, 5, 12); ctx.fillRect(183, 128, 5, 12);
      drawShamrock(ctx, 170, 118, 8, PALETTE.emerald);
    }
    if (s === 'cathedral' && !this.state.getFlag('has_banner')) {
      ctx.fillStyle = PALETTE.emerald; ctx.fillRect(290, 80, 25, 18);
      ctx.fillStyle = PALETTE.white;   ctx.fillRect(290, 98, 25, 18);
      ctx.fillStyle = PALETTE.orange;  ctx.fillRect(290, 116, 25, 18);
      ctx.fillStyle = PALETTE.wood;    ctx.fillRect(288, 78, 3, 58);
    }
    if (s === 'steamtown' && !this.state.getFlag('has_horseshoe')) {
      ctx.strokeStyle = PALETTE.brown; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(302, 90, 9, Math.PI, 0); ctx.stroke();
      ctx.fillStyle = PALETTE.brown; ctx.fillRect(293, 90, 4, 7); ctx.fillRect(307, 90, 4, 7);
    }
    if (s === 'lackawanna' && !this.state.getFlag('has_bulb')) {
      const bglow = ctx.createRadialGradient(270, 140, 1, 270, 140, 14);
      bglow.addColorStop(0, 'rgba(0,255,100,0.4)'); bglow.addColorStop(1, 'rgba(0,255,100,0)');
      ctx.fillStyle = bglow; ctx.beginPath(); ctx.arc(270, 140, 14, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = PALETTE.emerald; ctx.beginPath(); ctx.arc(270, 140, 8, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#00ff66'; ctx.beginPath(); ctx.arc(267, 136, 3, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = PALETTE.stone; ctx.fillRect(266, 147, 8, 6);
    }
    // Float decoration: draw item icons on float surface when decorated
    if (s === 'parade' && this.floatDecorated) {
      const items = ['shamrock_bouquet', 'parade_banner', 'horseshoe', 'green_bulb', 'race_bib'];
      const floatIconY = 122;
      items.forEach((itemId, i) => {
        const ix = 140 + i * 18;
        ctx.save();
        ctx.translate(ix, floatIconY);
        ctx.scale(0.55, 0.55);
        drawItemIcon(ctx, 0, 0, itemId);
        ctx.restore();
      });
      // Gold sparkle star on float center
      const sp = Math.sin(this.animTimer * 4) * 0.5 + 0.5;
      ctx.fillStyle = `rgba(255,220,0,${0.5 + sp * 0.5})`;
      ctx.font = '12px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('★', 185, 108);
      ctx.textAlign = 'left';
    }
  }

  _renderCoins(ctx) {
    if (!this.sceneId) return;
    const t = this.animTimer;
    for (const coin of LUCKY_COINS) {
      if (coin.scene !== this.sceneId) continue;
      if (this.state.getFlag(coin.id)) continue;
      const { x, y } = coin;
      // Gold coin with radial gradient
      const cg = ctx.createRadialGradient(x - 2, y - 2, 1, x, y, 6);
      cg.addColorStop(0, '#ffe066');
      cg.addColorStop(0.6, '#ffd700');
      cg.addColorStop(1, '#b8860b');
      ctx.fillStyle = cg;
      ctx.beginPath(); ctx.arc(x, y, 6, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#886600'; ctx.lineWidth = 1; ctx.stroke();
      // Inner shamrock
      drawShamrock(ctx, x, y - 1, 3, '#004422');
      // Glint sparkle every 90 frames (based on animTimer)
      const frame = Math.floor(t * 60);
      const phase = frame % 90;
      if (phase < 10) {
        const progress = phase / 10;
        const starR = progress * 5;
        ctx.strokeStyle = `rgba(255,255,200,${1 - progress})`;
        ctx.lineWidth = 1;
        for (let a = 0; a < Math.PI * 2; a += Math.PI / 2) {
          ctx.beginPath();
          ctx.moveTo(x + Math.cos(a) * 1.5, y + Math.sin(a) * 1.5);
          ctx.lineTo(x + Math.cos(a) * starR, y + Math.sin(a) * starR);
          ctx.stroke();
        }
      }
    }
  }

  _getHoverLabel() {
    const { usingItem, popup } = this.ui;
    if (usingItem) return `Use ${ITEM_NAMES[usingItem]} on \u2026`;
    if (popup) return popup.target.name || null;
    const x = this.input.x, y = this.input.y;
    if (y < 14 || y >= INVENTORY_Y) return null;
    const scene = this.currentScene;
    if (!scene) return null;
    for (const npc of scene.npcs) {
      if (rectContains(makeRect(npc.x - 14, npc.y - 55, 28, 56), x, y)) {
        return this._npcDisplayName(npc.type);
      }
    }
    for (const hs of scene.hotspots) {
      if (rectContains(hs.rect, x, y)) return hs.name;
    }
    return null;
  }

  _renderHoverHighlight(ctx) {
    if (this.ui.popup || this.ui.usingItem) return;
    const scene = this.currentScene;
    if (!scene) return;
    const x = this.input.x, y = this.input.y;
    const hoverInBounds = y >= 14 && y < INVENTORY_Y;

    // Always draw faint outlines on all interactable objects (visible on touch too)
    ctx.lineWidth = 1;
    for (const hs of scene.hotspots) {
      const hovered = hoverInBounds && rectContains(hs.rect, x, y);
      ctx.strokeStyle = hovered ? 'rgba(0,255,100,0.55)' : 'rgba(0,0,0,0)';
      ctx.strokeRect(hs.rect.x + 0.5, hs.rect.y + 0.5, hs.rect.w - 1, hs.rect.h - 1);
    }
    for (const npc of scene.npcs) {
      const nr = makeRect(npc.x - 14, npc.y - 55, 28, 56);
      const hovered = hoverInBounds && rectContains(nr, x, y);
      const glowAlpha = hovered ? 0.18 : 0.06;
      const glow = ctx.createRadialGradient(npc.x, npc.y - 28, 4, npc.x, npc.y - 28, 28);
      glow.addColorStop(0, `rgba(0,255,100,${glowAlpha})`);
      glow.addColorStop(1, 'rgba(0,255,100,0)');
      ctx.fillStyle = glow;
      ctx.beginPath(); ctx.arc(npc.x, npc.y - 28, 28, 0, Math.PI * 2); ctx.fill();
    }
  }

  _renderAmbient(ctx) {
    if (!this.sceneId) return;
    const t = this.animTimer;
    if (this.sceneId === 'pub') {
      // Flicker the flames in the fireplace
      const flicker = Math.sin(t * 13) * 0.12 + Math.sin(t * 7.3) * 0.06;
      const scaleX = 1 + flicker, scaleY = 1 + flicker * 0.5;
      ctx.save();
      ctx.translate(45, 130);
      ctx.scale(scaleX, scaleY);
      ctx.translate(-45, -130);
      const fr = Math.floor(120 + flicker * 40);
      ctx.fillStyle = `rgb(255,${fr},0)`;
      ctx.beginPath(); ctx.moveTo(25,130); ctx.bezierCurveTo(28,110,32,105,35,98); ctx.bezierCurveTo(38,105,40,112,38,130); ctx.closePath(); ctx.fill();
      ctx.fillStyle = `rgb(255,${Math.floor(100 + flicker * 60)},0)`;
      ctx.beginPath(); ctx.moveTo(32,130); ctx.bezierCurveTo(35,112,39,107,42,100); ctx.bezierCurveTo(45,108,47,116,44,130); ctx.closePath(); ctx.fill();
      ctx.fillStyle = `rgb(255,${Math.floor(200 + flicker * 30)},0)`;
      ctx.beginPath(); ctx.moveTo(38,130); ctx.bezierCurveTo(40,115,42,110,45,105); ctx.bezierCurveTo(47,111,48,120,46,130); ctx.closePath(); ctx.fill();
      ctx.restore();
    } else if (this.sceneId === 'steamtown') {
      // Rising steam puffs from locomotive stack (x=125, top y=84)
      for (let i = 0; i < 3; i++) {
        const phase = (t * 0.7 + i * 0.33) % 1;
        const py = 84 - phase * 50;
        const pr = 3 + phase * 9;
        const alpha = (1 - phase) * 0.38;
        ctx.fillStyle = `rgba(210,220,230,${alpha})`;
        ctx.beginPath();
        ctx.arc(125 + Math.sin(t * 1.8 + i) * 4, py, pr, 0, Math.PI * 2);
        ctx.fill();
      }
      // Coal cart offset (push animation)
      if (this.cartOffset > 0) {
        ctx.save();
        ctx.translate(this.cartOffset, 0);
        ctx.fillStyle = '#2a2a2a'; ctx.fillRect(240, 120, 60, 25);
        ctx.fillStyle = '#111'; ctx.fillRect(240, 118, 60, 5);
        for (let cx = 244; cx < 296; cx += 6) {
          ctx.fillStyle = '#222'; ctx.beginPath(); ctx.arc(cx, 120, 4, 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = '#333'; ctx.beginPath(); ctx.arc(cx + 2, 118, 3, 0, Math.PI * 2); ctx.fill();
        }
        ctx.fillStyle = '#333'; ctx.beginPath(); ctx.arc(253, 145, 6, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(275, 145, 6, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
      }
    } else if (this.sceneId === 'parade') {
      // Crowd wave: left crowd arms oscillate
      const wave = Math.sin(t * 2.5) * 5;
      ctx.strokeStyle = '#334';
      ctx.lineWidth = 1.5;
      for (let pi = 0, px = 5; px < 130; px += 11, pi++) {
        const ph = 22 + (px % 14);
        const armWave = wave + Math.sin(t * 2.5 + pi * 0.8) * 4;
        if (pi % 2 === 0) {
          ctx.beginPath(); ctx.moveTo(px + 1, 110 - ph); ctx.lineTo(px - 4, 100 - ph + armWave); ctx.stroke();
        } else {
          ctx.beginPath(); ctx.moveTo(px + 5, 110 - ph); ctx.lineTo(px + 10, 100 - ph - armWave); ctx.stroke();
        }
      }
    }
  }

  async _talkToNPC(npc) {
    this.mode = 'dialogue';
    await this.dialogue.run(npc.dialogueId, npc.type, this._npcDisplayName(npc.type));
    if (!this.dialogue.active) {
      this.mode = this.state.getFlag('parade_started') ? 'win' : 'play';
      if (this.state.getFlag('parade_started')) {
        this._triggerWin();
      } else if (npc.dialogueId === 'siobhan' && !this.state.getFlag('shownInteractHint')) {
        this.state.setFlag('shownInteractHint', true);
        this.showMessage('Tap any object to interact!');
      }
    }
  }

  _npcDisplayName(type) {
    const names = {
      siobhan: 'Siobhan',
      father_callahan: 'Father Callahan',
      seamus: 'Old Seamus',
      maggie: 'Maggie',
      marshal: 'Grand Marshal O\'Brien',
    };
    return names[type] || type;
  }

  handleVerb(verb, target) {
    if (verb === 'go') {
      if (target.isExit && target.exitTo) {
        // Warn if the scene's key item hasn't been collected yet
        const itemWarnings = {
          pub:        { flag: 'has_shamrock',  npc: 'Siobhan',          item: 'Shamrock Bouquet' },
          footrace:   { flag: 'has_bib',       npc: 'Race Director',    item: 'Race Bib' },
          cathedral:  { flag: 'has_banner',    npc: 'Father Callahan',  item: 'Parade Banner' },
          steamtown:  { flag: 'has_horseshoe', npc: 'Old Seamus',       item: 'Lucky Horseshoe' },
          lackawanna: { flag: 'has_bulb',      npc: 'Maggie',           item: 'Green Light Bulb' },
        };
        const warn = itemWarnings[this.sceneId];
        if (warn && !this.state.getFlag(warn.flag)) {
          const quizFlag = { pub: 'quiz_pub_done', footrace: 'quiz_footrace_done', cathedral: 'quiz_cathedral_done', steamtown: 'quiz_steamtown_done', lackawanna: 'quiz_lackawanna_done' }[this.sceneId];
          if (!this.state.getFlag(quizFlag)) {
            this.showMessage(`Wait — talk to ${warn.npc} first! They have the ${warn.item} for the parade.`);
          } else {
            this.showMessage(`Don't forget the ${warn.item}! Grab it before you go.`);
          }
          return;
        }
        this._walkThenDo(target.rect.x + target.rect.w / 2, VIEWPORT_H - 20, () => {
          this.loadScene(target.exitTo);
        });
      }
      return;
    }
    if (verb === 'talk') {
      if (target.id === 'crowd' && this.sceneId === 'parade') {
        // Crowd dialogue box
        this.dialogue.active = true;
        this.dialogue.npcName = 'The Crowd';
        this.dialogue.npcType = 'marshal';
        this.dialogue.quizActive = false;
        this.dialogue.quizFeedbackTimer = 0;
        this.dialogue.lines = [
          "The crowd cheers: 'Go on, Paddy! Erin go Bragh!'",
          "A little girl waves a tiny Irish flag and shouts 'Top o' the mornin', Paddy!'",
          "An old man calls out: 'Make us proud, lad — we're all rooting for ye!'",
        ];
        this.dialogue.lineIndex = 0;
        this.mode = 'dialogue';
        this.dialogue.resolve = () => {
          this.dialogue.active = false;
          this.mode = 'play';
        };
      } else {
        this.showMessage(this.currentScene.dialogues[target.id] || 'Nothing interesting here.');
      }
      return;
    }
    if (verb === 'take') {
      if (target.item) {
        this._walkThenDo(target.rect.x + target.rect.w / 2, target.rect.y + target.rect.h, () => {
          this.inventory.add(target.item);
          this.state.setFlag(target.flag || `has_${target.item}`, true);
          this.showMessage('Paddy picks up the ' + ITEM_NAMES[target.item] + '!');
          this.paddyCelebrate = true;
          this.celebrateTimer = 1.5;
          sound.pickup();
          this._saveState();
        });
      }
      return;
    }
    if (verb === 'push') {
      if (target.id === 'coal_cart' && this.sceneId === 'steamtown') {
        this._walkThenDo(target.rect.x, target.rect.y + target.rect.h, () => {
          this.showMessage("Paddy shoves the cart with a grunt. 'Heavy as sin!' he says. A railroad spike clatters out!");
          this.cartPushTimer = 0.5;
          this.cartOffset = 0;
        });
      } else {
        this.showMessage(this.currentScene.dialogues[target.id] || 'Nothing interesting to see here.');
      }
      return;
    }
    if (verb === 'look') {
      this.showMessage(this.currentScene.dialogues[target.id] || 'Nothing interesting to see here.');
      return;
    }
    if (verb === 'use') {
      if (target.isExit) {
        this._walkThenDo(target.rect.x + target.rect.w / 2, VIEWPORT_H - 20, () => {
          this.loadScene(target.exitTo);
        });
      } else if (target.id === 'float' && this.sceneId === 'parade') {
        if (this.inventory.size === 0) {
          this.showMessage("The float needs decorating! Collect all five items and bring them here.");
        } else {
          this._walkThenDo(170, 140, () => {
            const missing = ['shamrock_bouquet','parade_banner','horseshoe','green_bulb','race_bib']
              .filter(i => !this.inventory.has(i)).map(i => ITEM_NAMES[i]);
            if (missing.length === 0) {
              this.floatDecorated = true;
              this.showMessage("All items are on the float! Now talk to Grand Marshal O'Brien to start the parade!");
            } else {
              this.showMessage('Still need: ' + missing.join(', '));
            }
          });
        }
      } else {
        this.showMessage(this.currentScene.dialogues[target.id] || "Paddy isn't sure what to do with that.");
      }
    }
  }

  _useItemOnHotspot(itemId, hotspot) {
    if (hotspot.id === 'float' && this.sceneId === 'parade') {
      const hasAll = ['shamrock_bouquet','parade_banner','horseshoe','green_bulb','race_bib']
        .every(i => this.inventory.has(i));
      if (hasAll) {
        this.floatDecorated = true;
        this.showMessage("All items are on the float! Now talk to Grand Marshal O'Brien to start the parade!");
      } else {
        const missing = ['shamrock_bouquet','parade_banner','horseshoe','green_bulb','race_bib']
          .filter(i => !this.inventory.has(i))
          .map(i => ITEM_NAMES[i]).join(', ');
        this.showMessage('Still missing: ' + missing);
      }
    } else {
      this.showMessage("That doesn't seem to work here.");
    }
  }

  showMessage(msg) {
    this.message = msg;
    this.messageTimer = 4.0;
  }

  async loadScene(sceneId) {
    this.mode = 'transition';
    sound.door();
    await this.fadeOut();
    this.sceneId = sceneId;
    this.currentScene = SCENES[sceneId];
    this.bgCache = null; // invalidate cache
    const start = this.currentScene.paddyStart;
    this.paddyX = start.x;
    this.paddyY = start.y;
    this.paddyTargetX = start.x;
    this.paddyTargetY = start.y;
    this.paddyWalking = false;
    this.message = '';
    this.messageTimer = 0;
    this.ui.closePopup();
    this.ui.usingItem = null;
    this._saveState();
    await this.fadeIn();
    this.mode = 'play';
  }

  fadeOut() {
    return new Promise(resolve => {
      this.transPhase = 'fadeout';
      this.transAlpha = 0;
      const step = () => {
        this.transAlpha += 0.06;
        if (this.transAlpha >= 1) { this.transAlpha = 1; resolve(); return; }
        requestAnimationFrame(step);
      };
      requestAnimationFrame(step);
    });
  }

  fadeIn() {
    return new Promise(resolve => {
      this.transPhase = 'fadein';
      const step = () => {
        this.transAlpha -= 0.06;
        if (this.transAlpha <= 0) { this.transAlpha = 0; this.transPhase = 'none'; resolve(); return; }
        requestAnimationFrame(step);
      };
      requestAnimationFrame(step);
    });
  }

  _triggerWin() {
    this.mode = 'win';
    this.winTimer = 0;
    const score = this.state.score;
    if (score > Storage.load('highscore', 0)) Storage.save('highscore', score);
    Storage.clear('gamestate');
    // Spawn confetti
    this.confetti = [];
    for (let i = 0; i < 60; i++) {
      this.confetti.push({
        x: Math.random() * W,
        y: Math.random() * H - H,
        vx: (Math.random() - 0.5) * 30,
        vy: 40 + Math.random() * 60,
        vr: (Math.random() - 0.5) * 5,
        rot: Math.random() * Math.PI * 2,
        color: [PALETTE.emerald, PALETTE.gold, PALETTE.white, PALETTE.orange, '#ff88ff'][Math.floor(Math.random() * 5)],
        w: 4 + Math.random() * 6,
        h: 3 + Math.random() * 4,
      });
    }
  }

  _checkResume() {
    const saved = Storage.load('gamestate', null);
    if (saved && !saved.flags.parade_started) {
      this.resumeData = saved;
      this.mode = 'resume';
    } else {
      Storage.clear('gamestate');
      this.startGame();
    }
  }

  _saveState() {
    Storage.save('gamestate', {
      sceneId: this.sceneId,
      flags: { ...this.state.flags },
      inventory: [...this.inventory],
      score: this.state.score,
      difficulty: this.difficulty,
    });
  }

  _restoreState(saved) {
    this.difficulty = saved.difficulty || 2;
    this.scoreMultiplier = [1, 1, 1.5, 2][this.difficulty] || 1;
    this.state.flags = { ...saved.flags };
    this.state.score = saved.score || 0;
    this.inventory = new Set(saved.inventory || []);
    this.bgCache = null;
    this.cartOffset = 0;
    this.cartPushTimer = 0;
    this.floatDecorated = false;
    this._cacheSessionQuestions();
    this.loadScene(saved.sceneId || 'pub');
  }

  startGame() {
    this.state.reset();
    this.inventory.clear();
    this.bgCache = null;
    this.cartOffset = 0;
    this.cartPushTimer = 0;
    this.floatDecorated = false;
    this._cacheSessionQuestions();
    this.loadScene('pub');
  }

  _cacheSessionQuestions() {
    this.sessionQuestions = {};
    this.sessionQuestionPtrs = {};
    const scenes = ['pub', 'footrace', 'cathedral', 'steamtown', 'lackawanna', 'parade'];
    for (const scene of scenes) {
      const pool = QUESTION_BANK.filter(q => q.scene === scene && q.difficulty <= this.difficulty);
      const shuffled = [...pool].sort(() => Math.random() - 0.5);
      this.sessionQuestions[scene] = shuffled.slice(0, 2);
      this.sessionQuestionPtrs[scene] = 0;
    }
  }

  render() {
    const ctx = this.ctx;
    ctx.clearRect(0, 0, W, H);

    if (this.mode === 'title') {
      this._renderTitle(ctx);
      return;
    }

    if (this.mode === 'resume') {
      this._renderResumeModal(ctx);
      return;
    }

    if (this.mode === 'difficulty') {
      this._renderDifficulty(ctx);
      return;
    }

    if (this.mode === 'help') {
      this._renderHelp(ctx);
      return;
    }

    if (this.mode === 'win') {
      this._renderWin(ctx);
      return;
    }

    // Render scene background (cached)
    if (this.currentScene) {
      if (!this.bgCache) {
        const off = document.createElement('canvas');
        off.width = W; off.height = VIEWPORT_H;
        this.currentScene.drawBg(off.getContext('2d'));
        this.bgCache = off;
      }
      ctx.drawImage(this.bgCache, 0, 0);
    }

    // Render Lucky Coins (live, not cached)
    this._renderCoins(ctx);

    // Render pickup items live so they disappear when taken
    this._renderPickupItems(ctx);

    // Ambient animation (fire, steam, crowd wave)
    this._renderAmbient(ctx);

    // Exit signs (appear after scene item collected)
    this._renderExitSigns(ctx);

    // Render entities depth-sorted by Y (higher Y = in front)
    if (this.currentScene) {
      const entities = [
        ...this.currentScene.npcs.map(npc => {
          const facing = Math.abs(this.paddyX - npc.x) < 40 ? (this.paddyX < npc.x ? -1 : 1) : 1;
          return {
            y: npc.y,
            draw: () => drawNPC(ctx, npc.x, npc.y, npc.type, this.paddyAnimFrame, facing)
          };
        }),
        { y: this.paddyY, draw: () => drawPaddy(ctx, this.paddyX, this.paddyY, this.paddyDir, this.paddyWalking ? this.paddyAnimFrame : 0, this.paddyCelebrate) }
      ];
      entities.sort((a, b) => a.y - b.y);
      entities.forEach(e => e.draw());
    } else {
      drawPaddy(ctx, this.paddyX, this.paddyY, this.paddyDir, this.paddyWalking ? this.paddyAnimFrame : 0, this.paddyCelebrate);
    }

    // Walk target indicator
    if (this.walkTargetTimer > 0) {
      const alpha = this.walkTargetTimer / 0.6;
      const pulse = 1 + 0.4 * Math.sin(this.animTimer * 12);
      ctx.strokeStyle = `rgba(0,255,100,${alpha * 0.8})`;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(this.walkTargetX, this.walkTargetY, 6 * pulse, 0, Math.PI * 2);
      ctx.stroke();
      ctx.strokeStyle = `rgba(0,255,100,${alpha * 0.4})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(this.walkTargetX, this.walkTargetY, 10 * pulse, 0, Math.PI * 2);
      ctx.stroke();
    }

    // Hover highlight (hotspot outline / NPC glow)
    this._renderHoverHighlight(ctx);

    // Scene name / hover name strip
    if (this.currentScene) {
      ctx.fillStyle = 'rgba(0,20,0,0.75)';
      ctx.fillRect(0, 0, W, 13);
      const hoverLabel = this._getHoverLabel();
      ctx.fillStyle = hoverLabel ? PALETTE.white : PALETTE.gold;
      ctx.font = '7px sans-serif';
      ctx.textAlign = 'center';
      const labelAreaW = W - 130 - 8;
      ctx.fillText(hoverLabel || this.currentScene.name, labelAreaW / 2, 9, labelAreaW);
      ctx.textAlign = 'left';
      // In-game help button "?" top-left
      roundRect(ctx, 2, 1, 12, 11, 2, PALETTE.darkGreen, PALETTE.popupBorder);
      ctx.fillStyle = PALETTE.white;
      ctx.font = 'bold 8px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('?', 8, 9);
      ctx.textAlign = 'left';
    }

    // Message overlay
    if (this.messageTimer > 0 && this.message) {
      this._renderMessage(ctx);
    }

    // UI (inventory + popup + HUD)
    this.ui.render(ctx);

    // Dialogue overlay
    if (this.mode === 'dialogue') {
      this.dialogue.render(ctx);
    }

    // Transition overlay
    if (this.transAlpha > 0) {
      ctx.fillStyle = `rgba(0,0,0,${this.transAlpha})`;
      ctx.fillRect(0, 0, W, H);
    }
  }

  _renderExitSigns(ctx) {
    if (!this.sceneId) return;
    // Each entry: flag that must be set, sign position (just right of exit hotspot), label
    const defs = {
      pub:        { flag: 'has_shamrock',  x: 22, y: 133, label: 'Footrace'    },
      footrace:   { flag: 'has_bib',       x: 22, y: 133, label: "St. Peter's" },
      cathedral:  { flag: 'has_banner',    x: 52, y: 158, label: 'Steamtown'   },
      steamtown:  { flag: 'has_horseshoe', x: 82, y: 140, label: 'Elec. City'  },
      lackawanna: { flag: 'has_bulb',      x: 42, y: 155, label: 'Parade!'     },
    };
    const def = defs[this.sceneId];
    if (!def || !this.state.getFlag(def.flag)) return;

    const t = this.animTimer;
    const pulse = (Math.sin(t * 2.8) + 1) / 2; // 0..1

    const fullLabel = '\u2190 ' + def.label;
    ctx.font = 'bold 7px sans-serif';
    const tw = ctx.measureText(fullLabel).width;
    const sw = tw + 10, sh = 14;
    const sx = def.x, sy = def.y;

    // Soft glow halo
    const glow = ctx.createRadialGradient(sx + sw / 2, sy + sh / 2, 2, sx + sw / 2, sy + sh / 2, sw * 0.75);
    glow.addColorStop(0, `rgba(0,255,100,${0.10 + pulse * 0.14})`);
    glow.addColorStop(1, 'rgba(0,255,100,0)');
    ctx.fillStyle = glow;
    ctx.beginPath(); ctx.arc(sx + sw / 2, sy + sh / 2, sw * 0.75, 0, Math.PI * 2); ctx.fill();

    // Sign board
    const borderAlpha = 0.6 + pulse * 0.4;
    roundRect(ctx, sx, sy, sw, sh, 3,
      'rgba(0,22,8,0.93)',
      `rgba(80,255,130,${borderAlpha})`
    );

    // Arrow + label text
    ctx.fillStyle = `rgba(255,215,0,${0.85 + pulse * 0.15})`;
    ctx.font = 'bold 7px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(fullLabel, sx + 4, sy + sh - 4);
    ctx.textAlign = 'left';
  }

  _renderMessage(ctx) {
    const msg = this.message;
    const bw = 280, bx = (W - bw) / 2;
    const by = 12;
    const bh = 40;
    roundRect(ctx, bx, by, bw, bh, 5, PALETTE.popupBg, PALETTE.popupBorder);
    ctx.fillStyle = PALETTE.white;
    ctx.font = '8px sans-serif';
    ctx.textAlign = 'center';
    wrapText(ctx, msg, bx + bw / 2, by + 12, bw - 16, 11);
    ctx.textAlign = 'left';
  }

  _renderResumeModal(ctx) {
    ctx.fillStyle = '#020e02';
    ctx.fillRect(0, 0, W, H);
    roundRect(ctx, 30, 70, 260, 110, 8, 'rgba(0,40,0,0.97)', PALETTE.gold);
    ctx.fillStyle = PALETTE.gold;
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('☘  Saved Game Found  ☘', W / 2, 92);
    const d = this.resumeData;
    const diffLabel = ['', 'Easy', 'Medium', 'Hard'][d.difficulty] || '';
    ctx.fillStyle = PALETTE.white;
    ctx.font = '8px sans-serif';
    ctx.fillText(`Scene: ${(d.sceneId || 'pub').replace(/_/g,' ')}`, W / 2, 110);
    ctx.fillText(`Score: ${d.score || 0} pts  •  ${diffLabel}`, W / 2, 122);
    // Resume button (left)
    roundRect(ctx, 40, 140, 100, 28, 5, '#004422', PALETTE.popupBorder);
    ctx.fillStyle = PALETTE.white;
    ctx.font = 'bold 9px sans-serif';
    ctx.fillText('Resume ▶', 90, 158);
    // New Game button (right)
    roundRect(ctx, 180, 140, 100, 28, 5, '#440022', PALETTE.popupBorder);
    ctx.fillStyle = PALETTE.white;
    ctx.fillText('New Game', 230, 158);
    ctx.textAlign = 'left';
  }

  _renderTitle(ctx) {
    // Dark green background
    ctx.fillStyle = '#020e02';
    ctx.fillRect(0, 0, W, H);

    // Animated shamrocks
    const t = this.animTimer;
    for (let i = 0; i < 8; i++) {
      const sx = (i * 45 + t * 20) % (W + 20) - 10;
      const sy = 50 + Math.sin(t + i) * 20;
      drawShamrock(ctx, sx, sy, 8 + Math.sin(t * 0.7 + i) * 3, PALETTE.emerald);
    }

    // Title box
    roundRect(ctx, 20, 30, 280, 60, 8, 'rgba(0,40,0,0.9)', PALETTE.popupBorder);
    ctx.fillStyle = PALETTE.gold;
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText("PADDY'S PARADE DAY", W / 2, 52);
    ctx.fillStyle = PALETTE.white;
    ctx.font = 'bold 10px sans-serif';
    ctx.fillText('ADVENTURE', W / 2, 66);
    ctx.fillStyle = PALETTE.emerald;
    ctx.font = '7px sans-serif';
    ctx.fillText('A Scranton St. Patrick\'s Parade Game', W / 2, 80);

    // Draw Paddy on title
    drawPaddy(ctx, W / 2, 145, 1, Math.floor(t * 5), false);

    // Subtitle
    roundRect(ctx, 50, 155, 220, 18, 4, 'rgba(0,30,0,0.8)', PALETTE.popupBorder);
    ctx.fillStyle = PALETTE.white;
    ctx.font = '8px sans-serif';
    ctx.fillText('Tap anywhere to begin!', W / 2, 167);

    // How to Play button
    roundRect(ctx, 90, 174, 140, 16, 4, 'rgba(0,40,0,0.85)', PALETTE.grassGreen);
    ctx.fillStyle = PALETTE.grassGreen;
    ctx.font = '7px sans-serif';
    ctx.fillText('☘ How to Play', W / 2, 185);

    // High score
    const hs = Storage.load('highscore', 0);
    if (hs > 0) {
      ctx.fillStyle = PALETTE.gold;
      ctx.font = 'bold 7px sans-serif';
      ctx.fillText(`Best: ${hs} pts`, W / 2, 198);
    }

    // Credits
    ctx.fillStyle = PALETTE.grassGreen;
    ctx.font = '6px sans-serif';
    ctx.fillText('paddy-parade.vercel.app  •  Erin Go Bragh!', W / 2, 210);

    ctx.textAlign = 'left';
  }

  _renderDifficulty(ctx) {
    ctx.fillStyle = '#020e02';
    ctx.fillRect(0, 0, W, H);
    // Animated shamrocks
    const t = this.animTimer;
    for (let i = 0; i < 8; i++) {
      const sx = (i * 45 + t * 20) % (W + 20) - 10;
      const sy = 50 + Math.sin(t + i) * 20;
      drawShamrock(ctx, sx, sy, 8 + Math.sin(t * 0.7 + i) * 3, '#003a1a');
    }
    // Header
    roundRect(ctx, 20, 10, 280, 22, 6, 'rgba(0,40,0,0.92)', PALETTE.popupBorder);
    ctx.fillStyle = PALETTE.gold;
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('☘  CHOOSE DIFFICULTY  ☘', W / 2, 25);
    ctx.fillStyle = PALETTE.white;
    ctx.font = '7px sans-serif';
    ctx.fillText('More difficulty = more points per quiz answer!', W / 2, 40);

    const savedDiff = Storage.load('difficulty', 0);
    const buttons = [
      { label: '🍀  EASY',   sub: 'Beginner-friendly questions • Score ×1',   y: 90,  diff: 1, fill: '#004422' },
      { label: '☘  MEDIUM', sub: 'Some Irish knowledge helps • Score ×1.5',  y: 128, diff: 2, fill: '#003322' },
      { label: '🎩  HARD',   sub: 'True Irish-Scranton historian! • Score ×2', y: 166, diff: 3, fill: '#220044' },
    ];
    for (const btn of buttons) {
      const isLast = savedDiff === btn.diff;
      roundRect(ctx, 30, btn.y, 260, 30, 6, btn.fill, isLast ? PALETTE.gold : PALETTE.popupBorder);
      ctx.fillStyle = PALETTE.gold;
      ctx.font = 'bold 9px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(btn.label, W / 2, btn.y + 13);
      ctx.fillStyle = PALETTE.lightGrey;
      ctx.font = '7px sans-serif';
      ctx.fillText(btn.sub, W / 2, btn.y + 24);
      if (isLast) {
        ctx.fillStyle = PALETTE.gold;
        ctx.font = 'bold 9px sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText('▶', 36, btn.y + 16);
        ctx.textAlign = 'center';
      }
    }

    // Back button
    roundRect(ctx, 15, H - 30, 55, 18, 4, PALETTE.darkGreen, PALETTE.popupBorder);
    ctx.fillStyle = PALETTE.white;
    ctx.font = 'bold 8px sans-serif';
    ctx.fillText('← Back', 42, H - 18);
    ctx.textAlign = 'left';
  }

  _renderHelp(ctx) {
    // Background
    ctx.fillStyle = '#020e02';
    ctx.fillRect(0, 0, W, H);
    // Animated shamrocks
    const t = this.animTimer;
    for (let i = 0; i < 6; i++) {
      const sx = (i * 60 + t * 15) % (W + 20) - 10;
      const sy = 30 + Math.sin(t * 0.8 + i) * 12;
      drawShamrock(ctx, sx, sy, 6 + Math.sin(t * 0.5 + i) * 2, '#003a1a');
    }
    // Header
    roundRect(ctx, 10, 8, 300, 22, 6, 'rgba(0,40,0,0.9)', PALETTE.popupBorder);
    ctx.fillStyle = PALETTE.gold;
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('☘  HOW TO PLAY  ☘', W / 2, 22);

    if (this.helpPage === 0) {
      // Page 1: Controls
      const controls = [
        ['👤', 'Tap a person', 'Talk to them'],
        ['🔍', 'Tap a thing',  'Look / Take / Go'],
        ['🚶', 'Tap the floor', 'Paddy walks there'],
        ['🎒', 'Tap item icon', 'Use it on a hotspot'],
        ['🪙', 'Tap a gold coin', 'Collect for +5 pts!'],
      ];
      controls.forEach(([icon, label, desc], i) => {
        const iy = 48 + i * 28;
        roundRect(ctx, 15, iy, 290, 24, 4, 'rgba(0,25,0,0.7)', '#224422');
        ctx.fillStyle = PALETTE.white;
        ctx.font = 'bold 8px sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText(icon + '  ' + label, 24, iy + 10);
        ctx.fillStyle = PALETTE.grassGreen;
        ctx.font = '7px sans-serif';
        ctx.fillText('→ ' + desc, 24, iy + 20);
      });
    } else {
      // Page 2: Quest & items
      roundRect(ctx, 15, 36, 290, 18, 4, 'rgba(0,30,0,0.8)', PALETTE.popupBorder);
      ctx.fillStyle = PALETTE.gold;
      ctx.font = 'bold 8px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Your quest: Find 5 items before noon!', W / 2, 48);
      const items = [
        { icon: 'shamrock_bouquet', name: 'Shamrock Bouquet',  where: "Paddy's Pub",          flag: 'has_shamrock' },
        { icon: 'race_bib',         name: 'Race Bib',          where: 'Kelly Footrace',        flag: 'has_bib' },
        { icon: 'parade_banner',    name: 'Parade Banner',     where: "St. Peter's Cathedral", flag: 'has_banner' },
        { icon: 'horseshoe',        name: 'Lucky Horseshoe',   where: 'Steamtown NHS',         flag: 'has_horseshoe' },
        { icon: 'green_bulb',       name: 'Green Light Bulb',  where: 'Lackawanna Ave',        flag: 'has_bulb' },
      ];
      items.forEach(({ icon, name, where, flag }, i) => {
        const iy = 58 + i * 24;
        const done = this.state.getFlag(flag);
        roundRect(ctx, 15, iy, 290, 24, 4, done ? 'rgba(0,40,0,0.8)' : 'rgba(0,25,0,0.7)', done ? PALETTE.gold : '#224422');
        drawItemIcon(ctx, 30, iy + 12, icon);
        ctx.fillStyle = done ? PALETTE.gold : PALETTE.white;
        ctx.font = 'bold 7px sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText(name, 46, iy + 9);
        ctx.fillStyle = done ? PALETTE.gold : PALETTE.grassGreen;
        ctx.font = '6px sans-serif';
        ctx.fillText((done ? '☑ Collected!' : '☐ ') + (done ? '' : '📍 ' + where), 46, iy + 19);
      });
      // Bonus tips
      roundRect(ctx, 15, 182, 290, 14, 3, 'rgba(0,30,0,0.8)', PALETTE.gold);
      ctx.fillStyle = PALETTE.gold;
      ctx.font = '7px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('🪙 6 hidden Lucky Coins (+5 pts each)   📚 12 quiz questions (+10 pts each)', W / 2, 192);
    }

    // Navigation buttons
    ctx.textAlign = 'center';
    roundRect(ctx, 15, H - 30, 55, 18, 4, PALETTE.darkGreen, PALETTE.popupBorder);
    ctx.fillStyle = PALETTE.white; ctx.font = 'bold 8px sans-serif';
    ctx.fillText(this.helpPage === 0 ? '✕ Close' : '← Back', 42, H - 18);

    roundRect(ctx, W - 70, H - 30, 55, 18, 4, PALETTE.darkGreen, PALETTE.popupBorder);
    ctx.fillStyle = PALETTE.white;
    ctx.fillText(this.helpPage === 1 ? '✓ Done' : 'Next →', W - 42, H - 18);

    ctx.fillStyle = PALETTE.white;
    ctx.font = '6px sans-serif';
    ctx.fillText(`Page ${this.helpPage + 1} / 2`, W / 2, H - 18);
    ctx.textAlign = 'left';
  }

  _renderWin(ctx) {
    // Draw parade background
    if (!this.bgCache || this._lastBgScene !== 'parade') {
      const off = document.createElement('canvas');
      off.width = W; off.height = VIEWPORT_H;
      drawBgParade(off.getContext('2d'));
      this.bgCache = off;
      this._lastBgScene = 'parade';
    }
    ctx.drawImage(this.bgCache, 0, 0);

    // Confetti
    for (const c of this.confetti) {
      ctx.save();
      ctx.translate(c.x, c.y);
      ctx.rotate(c.rot);
      ctx.fillStyle = c.color;
      ctx.fillRect(-c.w / 2, -c.h / 2, c.w, c.h);
      ctx.restore();
    }

    // Shamrocks raining
    for (let i = 0; i < 5; i++) {
      drawShamrock(ctx, ((i * 80 + this.winTimer * 30) % (W + 20)) - 10,
        ((this.winTimer * 40 + i * 55) % (VIEWPORT_H + 20)) - 10, 10, PALETTE.emerald);
    }

    // Win banner
    roundRect(ctx, 10, 35, 300, 110, 8, 'rgba(0,30,0,0.95)', PALETTE.gold);
    ctx.fillStyle = PALETTE.gold;
    ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('☘  THE PARADE HAS BEGUN!  ☘', W / 2, 56);
    ctx.fillStyle = PALETTE.white;
    ctx.font = '8px sans-serif';
    ctx.fillText('Congratulations, Paddy!', W / 2, 72);
    ctx.fillText('You saved the Scranton', W / 2, 84);
    ctx.fillText("St. Patrick's Parade!", W / 2, 96);
    ctx.fillStyle = PALETTE.emerald;
    ctx.font = 'bold 10px sans-serif';
    const diffLabel = ['', 'Easy', 'Medium', 'Hard'][this.difficulty] || '';
    ctx.fillText(`Final Score: ${this.state.score} pts (${diffLabel})`, W / 2, 114);
    ctx.fillStyle = PALETTE.gold;
    ctx.font = '7px sans-serif';
    ctx.fillText('ERIN GO BRAGH!', W / 2, 128);

    // Share button (if Web Share API available)
    if (navigator.share) {
      roundRect(ctx, 100, 135, 120, 18, 4, '#004433', PALETTE.popupBorder);
      ctx.fillStyle = PALETTE.white;
      ctx.font = 'bold 7px sans-serif';
      ctx.fillText('Share Score \u2197', W / 2, 147);
    }

    // Inventory bar area — show collected items
    ctx.fillStyle = '#0a2a0a';
    ctx.fillRect(0, INVENTORY_Y, W, INVENTORY_H);
    ctx.strokeStyle = PALETTE.gold; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, INVENTORY_Y); ctx.lineTo(W, INVENTORY_Y); ctx.stroke();
    const slotW = W / ITEM_IDS.length;
    for (let i = 0; i < ITEM_IDS.length; i++) {
      drawItemIcon(ctx, i * slotW + slotW / 2, INVENTORY_Y + INVENTORY_H / 2, ITEM_IDS[i]);
    }

    // Footer
    ctx.fillStyle = '#0a1a0a';
    ctx.fillRect(0, 220, W, 20);
    ctx.fillStyle = PALETTE.grassGreen;
    ctx.font = '6px sans-serif';
    ctx.fillText('Happy St. Patrick\'s Day from paddy-parade.vercel.app  •  Tap to play again', W / 2, 231);

    ctx.textAlign = 'left';
  }
}

// ═══════════════════════════════════════════════════════════════════
// SECTION 10: BOOT
// ═══════════════════════════════════════════════════════════════════

window.onload = () => {
  const canvas = document.getElementById('game');
  // Scale canvas buffer to device pixel ratio so text/lines render at native sharpness
  const dpr = window.devicePixelRatio || 1;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  const game = new Game(canvas);
  game.ctx.scale(dpr, dpr);  // all drawing uses logical 320×240 coords
  game.start();
};
</script>
</body>
</html>
